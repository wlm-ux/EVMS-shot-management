function fmtMs(ms){ var d=new Date(ms); return pad2(d.getDate())+"."+pad2(d.getMonth()+1)+"."+String(d.getFullYear()).slice(2)+" "+pad2(d.getHours())+":"+pad2(d.getMinutes()); }

var TL_START=RAW[0].ts, TL_END=RAW[RAW.length-1].ts, TL_SPAN=TL_END-TL_START;
var SHOTS=RAW.map(function(s){ var d=new Date(s.ts); return Object.assign({},s,{ date:pad2(d.getDate())+"."+pad2(d.getMonth()+1)+"."+String(d.getFullYear()).slice(2), time:pad2(d.getHours())+":"+pad2(d.getMinutes()) }); });
function sumMB(ids){ return SHOTS.filter(function(s){return ids.has(s.id);}).reduce(function(a,s){return a+parseFloat(s.size);},0).toFixed(1); }

// ── Primitives ────────────────────────────────────────────────────
function Tag({icon, label}){
  return <div style={{display:"flex",alignItems:"center",gap:4,padding:"2px 8px",borderRadius:4,flexShrink:0}}>{icon}<span style={{fontFamily:sans,fontWeight:400,fontSize:14,lineHeight:"20px",color:C.textPrimary,whiteSpace:"nowrap"}}>{label}</span></div>;
}
function Toggle({active,onToggle,label}){
  return(
    <div onClick={onToggle} style={{display:"flex",alignItems:"center",gap:12,cursor:"pointer",userSelect:"none"}}>
      <div style={{width:26.7,height:16,borderRadius:999,padding:"2.7px",boxSizing:"border-box",background:active?C.textPrimary:C.bgTertiary,display:"flex",alignItems:"center",justifyContent:active?"flex-end":"flex-start",transition:"background 0.2s",flexShrink:0}}>
        <div style={{width:10.7,height:10.7,borderRadius:"50%",background:active?C.bgPage:C.textPrimary}}/>
      </div>
      <span style={{fontFamily:sans,fontSize:16,lineHeight:"24px",color:C.textPrimary}}>{label}</span>
    </div>
  );
}
function Checkbox({checked,onClick}){
  var isChecked=checked===true,isIndet=checked==="indeterminate";
  return(
    <div onClick={onClick} style={{width:16,height:16,borderRadius:4,flexShrink:0,border:"1px solid "+(isChecked||isIndet?C.action:C.border),background:isChecked||isIndet?C.action:C.textPrimary,display:"flex",alignItems:"center",justifyContent:"center",overflow:"hidden",cursor:"pointer",transition:"background 0.15s,border-color 0.15s"}}>
      {isChecked&&<IconCheck/>}
      {isIndet&&<div style={{width:8,height:2,background:C.bgPage,borderRadius:1}}/>}
    </div>
  );
}
function CheckboxField({checked,onClick,label}){
  return(
    <div onClick={onClick} style={{display:"flex",alignItems:"center",gap:12,minWidth:120,cursor:"pointer",userSelect:"none"}}>
      <Checkbox checked={checked}/>
      <span style={{fontFamily:sans,fontWeight:400,fontSize:14,lineHeight:"20px",color:C.textPrimary}}>{label}</span>
    </div>
  );
}
function CardChip({onClick,children}){
  return(
    <div onClick={onClick} style={{background:C.bgPage,borderRadius:"50%",width:32,height:32,display:"flex",alignItems:"center",justifyContent:"center",cursor:"pointer",flexShrink:0}}>
      {children}
    </div>
  );
}
function ModalChip({onClick,tip,children}){
  var [hov,setHov]=useState(false);
  return(
    <div onClick={onClick} title={tip} onMouseEnter={function(){setHov(true);}} onMouseLeave={function(){setHov(false);}}
      style={{width:36,height:36,borderRadius:"50%",background:C.action,display:"flex",alignItems:"center",justifyContent:"center",cursor:"pointer",flexShrink:0,opacity:hov?0.8:1,transition:"opacity 0.15s"}}>
      {children}
    </div>
  );
}

// ── Preview Modal ─────────────────────────────────────────────────
function PreviewModal({shot,onClose,onDiscard}){
  var vidRef=useRef(null),trackRef=useRef(null);
  var [playing,setPlaying]=useState(false);
  var [current,setCurrent]=useState(0);
  var [duration,setDuration]=useState(0);
  var [seeking,setSeeking]=useState(false);
  var [visible,setVisible]=useState(false);
  var isLandscape=shot.orient==="landscape";
  var videoSrc=isLandscape?VIDEO_LANDSCAPE:VIDEO_PORTRAIT;
  useEffect(function(){var t=setTimeout(function(){setVisible(true);},10);return function(){clearTimeout(t);};},[]);
  useEffect(function(){var v=vidRef.current;if(!v)return;if(playing)v.play().catch(function(){setPlaying(false);});else v.pause();},[playing]);
  function handleLoadedMeta(){setDuration(vidRef.current.duration);setPlaying(true);}
  function handleTimeUpdate(){if(!seeking)setCurrent(vidRef.current.currentTime);}
  function handleEnded(){setPlaying(false);}
  function onTrackDown(e){
    e.preventDefault();setSeeking(true);
    function seek(ex){var r=trackRef.current.getBoundingClientRect();var t=Math.max(0,Math.min(1,(ex-r.left)/r.width))*(vidRef.current.duration||0);vidRef.current.currentTime=t;setCurrent(t);}
    seek(e.clientX);
    function onMove(ev){seek(ev.clientX);}
    function onUp(){setSeeking(false);window.removeEventListener("mousemove",onMove);window.removeEventListener("mouseup",onUp);}
    window.addEventListener("mousemove",onMove);window.addEventListener("mouseup",onUp);
  }
  function handleClose(){setVisible(false);setTimeout(onClose,220);}
  var pct=duration>0?(current/duration)*100:0;
  return(
    <div onClick={handleClose} style={{position:"fixed",inset:0,zIndex:300,background:visible?"rgba(22,20,49,0.88)":"rgba(22,20,49,0)",backdropFilter:visible?"blur(8px)":"blur(0px)",display:"flex",alignItems:"center",justifyContent:"center",padding:24,transition:"background 0.22s ease, backdrop-filter 0.22s ease"}}>
      <div onClick={function(e){e.stopPropagation();}} style={{background:C.bgSecondary,borderRadius:24,display:"flex",flexDirection:"column",width:isLandscape?"min(720px,100%)":"min(420px,100%)",boxShadow:"0 24px 64px rgba(0,0,0,0.55)",overflow:"hidden",opacity:visible?1:0,transform:visible?"scale(1) translateY(0px)":"scale(0.95) translateY(16px)",transition:"opacity 0.22s ease, transform 0.22s ease"}}>
        <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",padding:"16px 20px 0"}}>
          <span style={{fontFamily:sans,fontWeight:600,fontSize:18,color:C.textPrimary}}>Shot preview</span>
          <button onClick={handleClose} style={{background:"none",border:"none",cursor:"pointer",color:C.textSecondary,padding:4}}><IconX size={20}/></button>
        </div>
        <div onClick={function(){setPlaying(function(v){return !v;});}} style={{position:"relative",background:"#000",margin:"12px 20px 0",borderRadius:12,overflow:"hidden",aspectRatio:isLandscape?"16/9":"9/16",cursor:"pointer",maxHeight:isLandscape?"none":"55vh"}}>
          <video ref={vidRef} src={videoSrc} style={{width:"100%",height:"100%",objectFit:"cover",display:"block"}} onLoadedMetadata={handleLoadedMeta} onTimeUpdate={handleTimeUpdate} onEnded={handleEnded} preload="auto" playsInline muted/>
          {!playing&&<div style={{position:"absolute",inset:0,display:"flex",alignItems:"center",justifyContent:"center",pointerEvents:"none"}}><div style={{width:64,height:64,borderRadius:"50%",background:"rgba(22,20,49,0.72)",backdropFilter:"blur(4px)",display:"flex",alignItems:"center",justifyContent:"center"}}><IconPlay size={26}/></div></div>}
        </div>
        <div style={{padding:"12px 20px 0",display:"flex",flexDirection:"column",gap:8}}>
          <div ref={trackRef} onMouseDown={onTrackDown} style={{position:"relative",height:6,borderRadius:3,background:"rgba(187,188,214,0.2)",cursor:"pointer"}}>
            <div style={{position:"absolute",top:0,left:0,height:"100%",width:pct+"%",borderRadius:3,background:C.action}}/>
            <div style={{position:"absolute",top:"50%",left:pct+"%",transform:"translate(-50%,-50%)",width:14,height:14,borderRadius:"50%",background:C.textPrimary,boxShadow:"0 0 0 3px rgba(241,102,92,0.35)"}}/>
          </div>
          <div style={{display:"flex",alignItems:"center",gap:12}}>
            <button onClick={function(){if(vidRef.current&&vidRef.current.ended){vidRef.current.currentTime=0;setCurrent(0);}setPlaying(function(v){return !v;});}} style={{background:"none",border:"none",cursor:"pointer",padding:0,display:"flex",alignItems:"center"}}>
              {playing?<IconPause/>:<IconPlay size={22}/>}
            </button>
            <span style={{fontFamily:mono,fontSize:13,color:C.textSecondary}}>{fmtSec(current)} / {fmtSec(duration)}</span>
          </div>
        </div>
        <div style={{padding:"16px 20px 20px",display:"flex",flexDirection:"column",gap:12}}>
          <div style={{height:1,background:C.bgTertiary}}/>
          <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",gap:16,flexWrap:"wrap"}}>
            <div style={{display:"flex",flexWrap:"wrap",gap:6}}>
              <Tag icon={<IconCalendar/>} label={shot.date}/>
              <Tag icon={<IconClock/>} label={shot.time}/>
              <Tag icon={<IconTimer/>} label={shot.dur}/>
              <Tag icon={<IconUser/>} label={shot.user}/>
              <Tag icon={<IconFile/>} label={shot.size}/>
            </div>
            <div style={{display:"flex",alignItems:"center",gap:8,flexShrink:0}}>
              <ModalChip tip="Save" onClick={function(){}}><IconHeart color={C.textSecondary} size={15}/></ModalChip>
              <ModalChip tip="Download" onClick={function(){window.open(videoSrc,"_blank");}}><IconDownload color={C.textSecondary} size={15}/></ModalChip>
              <ModalChip tip="Discard" onClick={function(){onDiscard&&onDiscard(shot.id);handleClose();}}><IconTrash color={C.textSecondary} size={15}/></ModalChip>
            </div>
          </div>
        </div>
      </div>
    </div>
  );
}

// ── Range Slider ──────────────────────────────────────────────────
function RangeSlider({lo,hi,onChange,gridRef}){
  var trackRef=useRef(null),dragging=useRef(null);
  var [sliderW,setSliderW]=useState(null);
  useEffect(function(){
    var el=gridRef&&gridRef.current;if(!el)return;
    function calc(){var gw=el.getBoundingClientRect().width;setSliderW(Math.round((gw-48)/4*2+16));}
    calc();var ro=new ResizeObserver(calc);ro.observe(el);return function(){ro.disconnect();};
  },[gridRef]);
  var fracFromX=useCallback(function(cx){var r=trackRef.current.getBoundingClientRect();return Math.max(0,Math.min(1,(cx-r.left)/r.width));},[]);
  useEffect(function(){
    function onMove(e){if(!dragging.current||!trackRef.current)return;var f=fracFromX(e.clientX);if(dragging.current==="lo")onChange(Math.min(f,hi-0.001),hi);else onChange(lo,Math.max(f,lo+0.001));}
    function onUp(){dragging.current=null;}
    window.addEventListener("mousemove",onMove);window.addEventListener("mouseup",onUp);
    return function(){window.removeEventListener("mousemove",onMove);window.removeEventListener("mouseup",onUp);};
  },[lo,hi,onChange,fracFromX]);
  function ts(pct){return{position:"absolute",top:"50%",left:(pct*100)+"%",transform:"translate(-50%,-50%)",width:20,height:20,borderRadius:"50%",background:C.textPrimary,cursor:"grab",zIndex:2,userSelect:"none",boxShadow:"0 0 0 3px rgba(255,255,255,0.2)"};}
  return(
    <div style={{display:"flex",flexDirection:"column",gap:8,width:sliderW?sliderW+"px":"100%"}}>
      <div ref={trackRef} style={{position:"relative",height:6,borderRadius:3,background:"rgba(187,188,214,0.25)"}}>
        <div style={{position:"absolute",top:0,height:"100%",borderRadius:3,left:(lo*100)+"%",width:((hi-lo)*100)+"%",background:C.textSecondary}}/>
        <div style={ts(lo)} onMouseDown={function(e){e.preventDefault();dragging.current="lo";}}/>
        <div style={ts(hi)} onMouseDown={function(e){e.preventDefault();dragging.current="hi";}}/>
      </div>
      <div style={{display:"flex",justifyContent:"space-between"}}>
        <span style={{fontFamily:sans,fontSize:14,lineHeight:"20px",color:C.textPrimary}}>{fmtMs(TL_START+lo*TL_SPAN)}</span>
        <span style={{fontFamily:sans,fontSize:14,lineHeight:"20px",color:C.textPrimary}}>{fmtMs(TL_START+hi*TL_SPAN)}</span>
      </div>
    </div>
  );
}

// ── Shot Card ─────────────────────────────────────────────────────
function ShotCard({shot,selected,fav,showMeta,discarded,onToggle,onPreview,onToggleFav,onDiscard,onRecover}){
  var videoSrc=shot.orient==="landscape"?VIDEO_LANDSCAPE:VIDEO_PORTRAIT;
  var vidRef=useRef(null),scrubRef=useRef(null);
  var [hovering,setHovering]=useState(false);
  var [scrubPct,setScrubPct]=useState(0);
  var clickTimer=useRef(null);
  useEffect(function(){var v=vidRef.current;if(!v)return;if(hovering){v.currentTime=0;v.play().catch(function(){});}else{v.pause();v.currentTime=0;}},[hovering]);
  useEffect(function(){
    if(!hovering){setScrubPct(0);if(scrubRef.current)cancelAnimationFrame(scrubRef.current);return;}
    var start=null,dur=4000;
    function tick(ts){if(!start)start=ts;var elapsed=(ts-start)%dur;setScrubPct((elapsed/dur)*100);scrubRef.current=requestAnimationFrame(tick);}
    scrubRef.current=requestAnimationFrame(tick);
    return function(){if(scrubRef.current)cancelAnimationFrame(scrubRef.current);};
  },[hovering]);
  function handleClick(e){
    if(clickTimer.current){clearTimeout(clickTimer.current);clickTimer.current=null;e.preventDefault();onPreview();return;}
    clickTimer.current=setTimeout(function(){clickTimer.current=null;onToggle();},220);
  }
  return(
    <div onClick={handleClick} onMouseEnter={function(){setHovering(true);}} onMouseLeave={function(){setHovering(false);}}
      style={{background:C.bgTertiary,borderRadius:8,display:"flex",flexDirection:"column",border:selected?"2px solid "+C.action:"2px solid transparent",overflow:"hidden",cursor:"pointer",transition:"border-color 0.15s",userSelect:"none"}}>

        <img src={shot.img} alt="" style={{position:"absolute",inset:0,width:"100%",height:"100%",objectFit:"cover",display:"block",transition:"opacity 0.2s",opacity:hovering?0:1}}/>
        <video ref={vidRef} src={videoSrc} muted playsInline loop preload="none"
          style={{position:"absolute",inset:0,width:"100%",height:"100%",objectFit:"cover",display:"block",transition:"opacity 0.2s",opacity:hovering?1:0}}/>
        <div style={{position:"absolute",bottom:0,left:0,right:0,height:3,background:"rgba(187,188,214,0.2)",opacity:hovering?1:0,transition:"opacity 0.2s"}}>
          <div style={{height:"100%",width:scrubPct+"%",background:C.textSecondary,borderRadius:1,transition:"width 0.05s linear"}}/>
        </div>
        {hovering&&(
          <div onClick={function(e){e.stopPropagation();if(clickTimer.current){clearTimeout(clickTimer.current);clickTimer.current=null;}onPreview();}}
            style={{position:"absolute",inset:0,display:"flex",alignItems:"center",justifyContent:"center",pointerEvents:"auto"}}>
            <div style={{width:44,height:44,borderRadius:"50%",background:"rgba(22,20,49,0.72)",backdropFilter:"blur(4px)",display:"flex",alignItems:"center",justifyContent:"center"}}>
              <IconPlay size={18}/>
            </div>
          </div>
        )}
        <div onClick={function(e){e.stopPropagation();if(clickTimer.current){clearTimeout(clickTimer.current);clickTimer.current=null;}onToggle();}}
          style={{position:"absolute",top:8,left:8,opacity:(hovering||selected)?1:0,transition:"opacity 0.15s",pointerEvents:(hovering||selected)?"auto":"none"}}>
          <div style={{width:20,height:20,borderRadius:4,background:selected?C.action:"rgba(22,20,49,0.6)",border:"2px solid "+(selected?C.action:C.textPrimary),display:"flex",alignItems:"center",justifyContent:"center",transition:"background 0.15s, border-color 0.15s",backdropFilter:"blur(2px)"}}>
            {selected&&<IconCheck/>}
          </div>
        </div>
        <div style={{position:"absolute",top:10,right:8,display:"flex",flexDirection:"column",gap:8}}>
          {(hovering||fav)&&(
            <CardChip onClick={function(e){e.stopPropagation();onToggleFav();}}>
              <IconHeart size={15} color={C.action} filled={fav}/>
            </CardChip>
          )}
          {hovering&&(
            <>
              <CardChip onClick={function(e){e.stopPropagation();}}><IconDownload color={C.action} size={15}/></CardChip>
              {discarded
                ?<CardChip onClick={function(e){e.stopPropagation();onRecover();}}><IconRecover color={C.action} size={15}/></CardChip>

              }
            </>
          )}
        </div>
      </div>
      {showMeta&&(
        <div style={{padding:12}}>
          <div style={{display:"flex",flexWrap:"wrap",gap:2}}>
            <div style={{display:"flex",alignItems:"center",gap:4,padding:"2px 8px",borderRadius:4,flexShrink:0}}>
              {shot.orient==="landscape"
                ?<svg width="14" height="10" viewBox="0 0 18 12" fill="none"><rect x="1" y="1" width="16" height="10" rx="1.5" stroke={C.textPrimary} strokeWidth="1.5"/></svg>
                :<svg width="10" height="14" viewBox="0 0 12 18" fill="none"><rect x="1" y="1" width="10" height="16" rx="1.5" stroke={C.textPrimary} strokeWidth="1.5"/></svg>
              }
            </div>
            <Tag icon={<IconCalendar/>} label={shot.date}/>
            <Tag icon={<IconClock/>} label={shot.time}/>
            <Tag icon={<IconTimer/>} label={shot.dur}/>
            <Tag icon={<IconUser/>} label={shot.user}/>

              <span style={{fontFamily:sans,fontSize:14,lineHeight:"20px",color:C.textPrimary}}>John Doe</span>
              <span style={{fontFamily:mono,fontWeight:700,fontSize:12,lineHeight:"16px",color:C.textSecondary}}>@username</span>
            </div>
          </div>
          <div style={{border:"1px solid "+C.textPrimary,borderRadius:999,width:24,height:24,display:"flex",alignItems:"center",justifyContent:"center",cursor:"pointer"}}>
            <IconArrowRight size={13}/>
          </div>
        </div>
        <span style={{fontFamily:mono,fontSize:12,lineHeight:"16px",color:C.textSecondary}}>© 2026 SURESHOT APS</span>
      </div>
    </div>
  );
}

// ── Event Summary ─────────────────────────────────────────────────

  return(
    <div style={{background:C.bgSecondary,borderRadius:12,padding:"12px 16px"}}>
      <div style={{display:"flex",alignItems:"center",gap:24,padding:"12px 0"}}>
        <div style={{display:"flex",flexDirection:"column",gap:12,flexShrink:0}}>
          {/* Cover placeholder */}
          <div style={{width:241,height:128,borderRadius:16,overflow:"hidden"}}>
            <img src="https://images.unsplash.com/photo-1429962714451-bb934ecdc4ec?q=80&w=2340&auto=format&fit=crop" alt="Event cover" style={{width:"100%",height:"100%",objectFit:"cover",display:"block"}}/>
          </div>
          <div style={{background:C.action,borderRadius:8,display:"flex",alignItems:"center",justifyContent:"space-between",padding:"4px 8px 4px 12px",width:241,boxSizing:"border-box",cursor:"pointer"}}>
            <span style={{fontFamily:sans,fontSize:16,lineHeight:"24px",color:C.bgPage}}>Published</span>
            <IconChevronDown color={C.bgPage} size={24}/>
          </div>
        </div>
        <div style={{flex:1,display:"flex",flexDirection:"column",gap:12}}>
          <span style={{fontFamily:sans,fontWeight:600,fontSize:20,lineHeight:"24px",color:C.textPrimary}}>Event name</span>
          <div style={{display:"flex",alignItems:"center",gap:12,flexWrap:"wrap"}}>
            <div style={{display:"flex",alignItems:"center",gap:4}}><IconUsers size={16}/><span style={{fontFamily:sans,fontSize:16,lineHeight:"24px",color:C.textSecondary}}>4498</span></div>
            <div style={{display:"flex",alignItems:"center",gap:4}}><IconMapPin size={16}/><span style={{fontFamily:sans,fontSize:16,lineHeight:"24px",color:C.textSecondary}}>Location name</span></div>
            <div style={{display:"flex",alignItems:"center",gap:4}}><span style={{fontFamily:mono,fontWeight:700,fontSize:12,color:C.textPrimary}}>Start</span><span style={{fontFamily:sans,fontSize:16,lineHeight:"24px",color:C.textSecondary}}>10.03.26 09:00h</span></div>
            <div style={{display:"flex",alignItems:"center",gap:4}}><span style={{fontFamily:mono,fontWeight:700,fontSize:12,color:C.textPrimary}}>Finish</span><span style={{fontFamily:sans,fontSize:16,lineHeight:"24px",color:C.textSecondary}}>11.03.26 17:00h</span></div>
          </div>

            {stats.map(function(sc){return(

// ── Shots Panel ───────────────────────────────────────────────────
function ShotsPanel({selectedIds,onToggle,onSelectAll,onDeselectAll,favIds,onToggleFav,showMeta,onToggleMeta,showFavsOnly,onToggleFavsOnly,rangeLo,rangeHi,onRange,onDownload,onCollection,onPreview,discardedIds,onDiscard,onRecover,onBatchDiscard}){
  var [innerTab,setInnerTab]=useState("shots");
  var count=selectedIds.size;
  var loMs=TL_START+rangeLo*TL_SPAN,hiMs=TL_START+rangeHi*TL_SPAN;
  var gridRef=useRef(null);
  var tabs=["Shots","Attendees","Highlights","Pages","Settings"];
  var activeShots=SHOTS.filter(function(s){return !discardedIds.has(s.id);}).filter(function(s){return s.ts>=loMs&&s.ts<=hiMs;}).filter(function(s){return !showFavsOnly||favIds.has(s.id);});
  var discardedShots=SHOTS.filter(function(s){return discardedIds.has(s.id);});
  var visible=innerTab==="shots"?activeShots:discardedShots;
  var allSel=visible.length>0&&visible.every(function(s){return selectedIds.has(s.id);});
  var someSel=!allSel&&visible.some(function(s){return selectedIds.has(s.id);});
  var checkState=allSel?true:someSel?"indeterminate":false;
  function handleCheckbox(){if(allSel)onDeselectAll(visible);else onSelectAll(visible);}
  return(
    <div style={{background:C.bgSecondary,borderRadius:12,padding:"8px 24px 16px",display:"flex",flexDirection:"column",gap:12}}>
      <div style={{display:"flex",alignItems:"center",gap:12,padding:"8px 12px"}}>
        {tabs.map(function(t,i){return(
          <div key={t} style={{minWidth:128,padding:8,textAlign:"center",borderBottom:i===0?"2px solid "+C.textPrimary:"2px solid transparent"}}>
            <span style={{fontFamily:sans,fontWeight:600,fontSize:16,lineHeight:"24px",color:i===0?C.textPrimary:C.textSecondary}}>{t}</span>
          </div>
        );})}
      </div>
      <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",gap:24,padding:"12px 0"}}>
        <div style={{display:"flex",flexDirection:"column",gap:6}}>
          <span style={{fontFamily:mono,fontWeight:700,fontSize:12,lineHeight:"16px",color:C.textPrimary}}>Filter by date</span>
          <RangeSlider lo={rangeLo} hi={rangeHi} onChange={onRange} gridRef={gridRef}/>
        </div>
        <div style={{display:"flex",alignItems:"center",gap:8,flexShrink:0}}>
          <div style={{border:"1px solid "+C.action,borderRadius:999,padding:"8px 16px",display:"flex",alignItems:"center",gap:12,cursor:"pointer"}}>
            <IconUpload size={20}/>
            <span style={{fontFamily:sans,fontWeight:600,fontSize:16,color:C.action}}>Upload</span>
          </div>
          <BatchDropdown count={count} onDownload={onDownload} onCollection={onCollection} onDiscard={onBatchDiscard}/>
        </div>
      </div>
      <div style={{display:"flex",alignItems:"center",gap:24,flexWrap:"wrap"}}>
        <Toggle active={showMeta} onToggle={onToggleMeta} label="Show shot metadata"/>
        <Toggle active={showFavsOnly} onToggle={onToggleFavsOnly} label="Favorites only"/>
        <CheckboxField checked={checkState} onClick={handleCheckbox} label={"Select all ("+visible.length+")"}/>
        <div onClick={function(){setInnerTab(function(t){return t==="shots"?"discarded":"shots";});}}
          style={{display:"flex",alignItems:"center",gap:8,cursor:"pointer",padding:"4px 12px",borderRadius:8,background:innerTab==="discarded"?C.bgTertiary:"transparent",transition:"background 0.15s",userSelect:"none",marginLeft:"auto"}}>
          <IconTrash color={innerTab==="discarded"?C.textPrimary:C.textMuted} size={14}/>
          <span style={{fontFamily:sans,fontSize:14,lineHeight:"20px",color:innerTab==="discarded"?C.textPrimary:C.textMuted,whiteSpace:"nowrap"}}>Discarded shots</span>
          {discardedShots.length>0&&(
            <div style={{background:C.action,borderRadius:999,minWidth:18,height:18,display:"flex",alignItems:"center",justifyContent:"center",padding:"0 5px"}}>
              <span style={{fontFamily:mono,fontWeight:700,fontSize:10,color:C.bgPage}}>{discardedShots.length}</span>
            </div>
          )}
        </div>
      </div>
      {innerTab==="discarded"&&(
        <div style={{display:"flex",flexDirection:"column",gap:4,padding:"12px 16px",background:C.bgTertiary,borderRadius:12}}>
          <span style={{fontFamily:sans,fontWeight:600,fontSize:15,color:C.textPrimary}}>Discarded shots</span>
          <span style={{fontFamily:sans,fontSize:13,lineHeight:"18px",color:C.textSecondary}}>These shots have been removed from the event view. They'll be kept here for 30 days, then permanently deleted. You can restore any shot at any time before that.</span>
        </div>
      )}
      {visible.length>0?(
        <div ref={gridRef} style={{display:"grid",gridTemplateColumns:"repeat(4, 1fr)",gap:16}}>
          {visible.map(function(shot){return(
            <ShotCard key={shot.id} shot={shot}
              selected={selectedIds.has(shot.id)} onToggle={function(){onToggle(shot.id);}}
              onPreview={function(){onPreview(shot);}}
              fav={favIds.has(shot.id)} onToggleFav={function(){onToggleFav(shot.id);}}
              showMeta={showMeta}
              discarded={discardedIds.has(shot.id)}
              onDiscard={function(){onDiscard(shot.id);}}
              onRecover={function(){onRecover(shot.id);}}
            />
          );})}
        </div>
      ):(
        <div ref={gridRef} style={{textAlign:"center",padding:"48px 0",color:C.textSecondary,fontFamily:sans,fontSize:16}}>
          {innerTab==="discarded"?"No discarded shots.":"No shots in this time range."}
        </div>
      )}
    </div>
  );
}

// ── App ───────────────────────────────────────────────────────────
function App(){
  var [selectedIds,setSelectedIds]=useState(new Set());
  var [favIds,setFavIds]=useState(new Set());
  var [discardedIds,setDiscardedIds]=useState(new Set());
  var [showMeta,setShowMeta]=useState(true);
  var [showFavsOnly,setShowFavsOnly]=useState(false);
  var [rangeLo,setRangeLo]=useState(0);
  var [rangeHi,setRangeHi]=useState(1);
  var [showDlModal,setShowDlModal]=useState(false);
  var [showHighlight,setShowHighlight]=useState(false);
  var [previewShot,setPreviewShot]=useState(null);
  function toggleCard(id){setSelectedIds(function(p){var n=new Set(p);n.has(id)?n.delete(id):n.add(id);return n;});}
  function toggleFav(id){setFavIds(function(p){var n=new Set(p);n.has(id)?n.delete(id):n.add(id);return n;});}
  function discardShot(id){setDiscardedIds(function(p){var n=new Set(p);n.add(id);return n;});setSelectedIds(function(p){var n=new Set(p);n.delete(id);return n;});}
  function recoverShot(id){setDiscardedIds(function(p){var n=new Set(p);n.delete(id);return n;});}
  function batchDiscard(){setDiscardedIds(function(p){var n=new Set(p);selectedIds.forEach(function(id){n.add(id);});return n;});setSelectedIds(new Set());}
  var selectAll=useCallback(function(shots){setSelectedIds(function(p){var n=new Set(p);shots.forEach(function(s){n.add(s.id);});return n;});},[]);
  var deselectAll=useCallback(function(shots){setSelectedIds(function(p){var n=new Set(p);shots.forEach(function(s){n.delete(s.id);});return n;});},[]);
  var handleRange=useCallback(function(lo,hi){setRangeLo(lo);setRangeHi(hi);},[]);
  return(
    <div style={{display:"flex",alignItems:"flex-start",minHeight:"100vh",background:C.bgPage,fontFamily:sans}}>
      <Sidebar/>
      <div style={{flex:1,display:"flex",flexDirection:"column",gap:10,padding:"24px 16px",overflowY:"auto",boxSizing:"border-box"}}>
        <EventSummary/>
        <ShotsPanel
          selectedIds={selectedIds} onToggle={toggleCard}
          onSelectAll={selectAll} onDeselectAll={deselectAll}
          favIds={favIds} onToggleFav={toggleFav}
          discardedIds={discardedIds} onDiscard={discardShot} onRecover={recoverShot} onBatchDiscard={batchDiscard}
          showMeta={showMeta} onToggleMeta={function(){setShowMeta(function(v){return !v;});}}
          showFavsOnly={showFavsOnly} onToggleFavsOnly={function(){setShowFavsOnly(function(v){return !v;});}}
          rangeLo={rangeLo} rangeHi={rangeHi} onRange={handleRange}
          onDownload={function(){setShowDlModal(true);}}
          onCollection={function(){setShowHighlight(true);}}
          onPreview={function(shot){setPreviewShot(shot);}}
        />
      </div>
      {previewShot&&<PreviewModal shot={previewShot} onClose={function(){setPreviewShot(null);}} onDiscard={discardShot}/>}
      {showHighlight&&<HighlightModal selectedIds={selectedIds} onClose={function(){setShowHighlight(false);}}/>}
      {showDlModal&&<DownloadModal selectedIds={selectedIds} onConfirm={function(){setShowDlModal(false);}} onCancel={function(){setShowDlModal(false);}}/>}
    </div>
  );
}
ReactDOM.createRoot(document.getElementById("root")).render(React.createElement(App));
</script>
</body>
</html>
