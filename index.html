function pad2(n){ return String(n).padStart(2,"0"); }
function fmtMs(ms){
  var d=new Date(ms);
  return pad2(d.getDate())+"."+pad2(d.getMonth()+1)+"."+String(d.getFullYear()).slice(2)+" "+pad2(d.getHours())+":"+pad2(d.getMinutes());
}
function fmtSec(s){
  s=Math.floor(s||0);
  return pad2(Math.floor(s/60))+":"+pad2(s%60);
}

  { id:1,  orient:"portrait",  ts:new Date("2026-03-10T10:35:00").getTime(), img:"https://images.unsplash.com/photo-1470229722913-7c0e2dbbafd3?w=260&h=380&fit=crop&q=80", user:"Bob K.",    size:"22.7 MB", dur:"0:24" },
  { id:2,  orient:"landscape", ts:new Date("2026-03-10T12:00:00").getTime(), img:"https://images.unsplash.com/photo-1493225457124-a3eb161ffa5f?w=780&h=440&fit=crop&q=80", user:"Carol T.",  size:"18.1 MB", dur:"0:18" },

  { id:4,  orient:"portrait",  ts:new Date("2026-03-10T15:30:00").getTime(), img:"https://images.unsplash.com/photo-1524368535928-5b5e00ddc76b?w=260&h=380&fit=crop&q=80", user:"Eve S.",    size:"12.5 MB", dur:"0:08" },
  { id:5,  orient:"landscape", ts:new Date("2026-03-10T17:00:00").getTime(), img:"https://images.unsplash.com/photo-1514320291840-2e0a9bf2a9ae?w=780&h=440&fit=crop&q=80", user:"Frank L.",  size:"41.3 MB", dur:"0:36" },

  { id:8,  orient:"portrait",  ts:new Date("2026-03-10T23:00:00").getTime(), img:"https://images.unsplash.com/photo-1540575467063-178a50c2df87?w=260&h=380&fit=crop&q=80", user:"Iris N.",   size:"15.9 MB", dur:"0:10" },
  { id:9,  orient:"portrait",  ts:new Date("2026-03-11T01:00:00").getTime(), img:"https://images.unsplash.com/photo-1492684223066-81342ee5ff30?w=260&h=380&fit=crop&q=80", user:"Jack O.",   size:"48.2 MB", dur:"0:42" },
  { id:10, orient:"landscape", ts:new Date("2026-03-11T05:00:00").getTime(), img:"https://images.unsplash.com/photo-1506157786151-b8491531f063?w=780&h=440&fit=crop&q=80", user:"Kim Y.",    size:"20.4 MB", dur:"0:18" },
  { id:11, orient:"portrait",  ts:new Date("2026-03-11T09:00:00").getTime(), img:"https://images.unsplash.com/photo-1459749411175-04bf5292ceea?w=260&h=380&fit=crop&q=80", user:"Leo A.",    size:"33.7 MB", dur:"0:28" },
  { id:12, orient:"portrait",  ts:new Date("2026-03-11T13:00:00").getTime(), img:"https://images.unsplash.com/photo-1598387846148-47e82ee120cc?w=260&h=380&fit=crop&q=80", user:"Mia B.",    size:"11.3 MB", dur:"0:09" },
  { id:13, orient:"landscape", ts:new Date("2026-03-11T16:00:00").getTime(), img:"https://images.unsplash.com/photo-1511671782779-c97d3d27a1d4?w=780&h=440&fit=crop&q=80", user:"Nate C.",   size:"28.9 MB", dur:"0:24" },
];
var TL_START = RAW[0].ts, TL_END = RAW[RAW.length-1].ts, TL_SPAN = TL_END - TL_START;
var SHOTS = RAW.map(function(s){
  var d=new Date(s.ts);
  return Object.assign({},s,{
    date:pad2(d.getDate())+"."+pad2(d.getMonth()+1)+"."+String(d.getFullYear()).slice(2),
    time:pad2(d.getHours())+":"+pad2(d.getMinutes()),
  });
});
function sumMB(ids){ return SHOTS.filter(function(s){return ids.has(s.id);}).reduce(function(a,s){return a+parseFloat(s.size);},0).toFixed(1); }

// ── Primitives ────────────────────────────────────────────────────
function FigmaIcon(props){
  var sz=props.size||16;
  return React.createElement("div",{style:{position:"relative",flexShrink:0,width:sz,height:sz,overflow:"hidden"}},
    React.createElement("img",{src:props.src,alt:"",style:{position:"absolute",inset:0,width:"100%",height:"100%",display:"block",maxWidth:"none"}}));
}
function Tag(props){
  return(
    <div style={{display:"flex",alignItems:"center",gap:4,padding:"2px 8px",borderRadius:4,flexShrink:0}}>
      <FigmaIcon src={props.iconSrc} size={12}/>
      <span style={{fontFamily:sans,fontWeight:400,fontSize:14,lineHeight:"20px",color:C.textPrimary,whiteSpace:"nowrap"}}>{props.label}</span>
    </div>
  );
}
function Toggle(props){
  return(
    <div onClick={props.onToggle} style={{display:"flex",alignItems:"center",gap:12,cursor:"pointer",userSelect:"none"}}>
      <div style={{width:26.7,height:16,borderRadius:999,padding:"2.7px",boxSizing:"border-box",background:props.active?C.textPrimary:C.bgTertiary,display:"flex",alignItems:"center",justifyContent:props.active?"flex-end":"flex-start",transition:"background 0.2s",flexShrink:0}}>
        <div style={{width:10.7,height:10.7,borderRadius:"50%",background:props.active?C.bgPage:C.textPrimary}}/>
      </div>
      <span style={{fontFamily:sans,fontSize:16,lineHeight:"24px",color:C.textPrimary}}>{props.label}</span>
    </div>
  );
}
function Checkbox(props){
  var checked=props.checked,isChecked=checked===true,isIndet=checked==="indeterminate";
  return(
    <div onClick={props.onClick} style={{width:16,height:16,borderRadius:4,flexShrink:0,border:"1px solid "+(isChecked||isIndet?C.action:C.border),background:isChecked||isIndet?C.action:C.textPrimary,display:"flex",alignItems:"center",justifyContent:"center",overflow:"hidden",cursor:"pointer",transition:"background 0.15s,border-color 0.15s"}}>
      {isChecked&&<div style={{position:"relative",width:16,height:16,overflow:"hidden"}}><div style={{position:"absolute",top:"25%",left:"16.67%",right:"16.67%",bottom:"29.17%"}}><div style={{position:"absolute",inset:"-10.91% -7.5%"}}><img alt="" src={imgCheckIcon} style={{display:"block",width:"100%",height:"100%",maxWidth:"none"}}/></div></div></div>}
      {isIndet&&<div style={{width:8,height:2,background:C.bgPage,borderRadius:1}}/>}
    </div>
  );
}
function CheckboxField(props){
  return(
    <div onClick={props.onClick} style={{display:"flex",alignItems:"center",gap:12,minWidth:120,cursor:"pointer",userSelect:"none"}}>
      <Checkbox checked={props.checked}/>
      <span style={{fontFamily:sans,fontWeight:400,fontSize:14,lineHeight:"20px",color:C.textPrimary}}>{props.label}</span>
    </div>
  );
}

// ── Preview Modal ─────────────────────────────────────────────────
function PreviewModal(props){
  var shot=props.shot, onClose=props.onClose;
  var vidRef=useRef(null), trackRef=useRef(null);
  var [playing,  setPlaying]  = useState(false);
  var [current,  setCurrent]  = useState(0);
  var [duration, setDuration] = useState(0);
  var [seeking,  setSeeking]  = useState(false);
  var [visible,  setVisible]  = useState(false);

  var isLandscape = shot.orient === "landscape";
  var videoSrc    = isLandscape ? VIDEO_LANDSCAPE : VIDEO_PORTRAIT;

  // trigger entrance animation
  useEffect(function(){
    var t = setTimeout(function(){ setVisible(true); }, 10);
    return function(){ clearTimeout(t); };
  }, []);

  // sync play/pause → video element
  useEffect(function(){
    var v=vidRef.current; if(!v) return;
    if(playing) v.play().catch(function(){ setPlaying(false); });
    else v.pause();
  }, [playing]);

  function handleLoadedMeta(){ setDuration(vidRef.current.duration); setPlaying(true); }
  function handleTimeUpdate(){ if(!seeking) setCurrent(vidRef.current.currentTime); }
  function handleEnded(){ setPlaying(false); }

  function onTrackDown(e){
    e.preventDefault(); setSeeking(true);
    function seek(ex){
      var r=trackRef.current.getBoundingClientRect();
      var t=Math.max(0,Math.min(1,(ex-r.left)/r.width))*(vidRef.current.duration||0);
      vidRef.current.currentTime=t; setCurrent(t);
    }
    seek(e.clientX);
    function onMove(ev){ seek(ev.clientX); }
    function onUp(){ setSeeking(false); window.removeEventListener("mousemove",onMove); window.removeEventListener("mouseup",onUp); }
    window.addEventListener("mousemove",onMove);
    window.addEventListener("mouseup",onUp);
  }

  function handleClose(){
    setVisible(false);
    setTimeout(onClose, 220);
  }

  var pct = duration>0 ? (current/duration)*100 : 0;

  return(
    <div onClick={handleClose} style={{
      position:"fixed",inset:0,zIndex:300,
      background:visible?"rgba(22,20,49,0.88)":"rgba(22,20,49,0)",
      backdropFilter:visible?"blur(8px)":"blur(0px)",
      display:"flex",alignItems:"center",justifyContent:"center",padding:24,
      transition:"background 0.22s ease, backdrop-filter 0.22s ease",
    }}>
      <div onClick={function(e){e.stopPropagation();}} style={{
        background:C.bgSecondary,borderRadius:24,display:"flex",flexDirection:"column",
        width:isLandscape?"min(720px,100%)":"min(420px,100%)",
        boxShadow:"0 24px 64px rgba(0,0,0,0.55)",overflow:"hidden",
        opacity:visible?1:0,
        transform:visible?"scale(1) translateY(0px)":"scale(0.95) translateY(16px)",
        transition:"opacity 0.22s ease, transform 0.22s ease",
      }}>
        {/* header */}
        <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",padding:"16px 20px 0"}}>
          <span style={{fontFamily:sans,fontWeight:600,fontSize:18,color:C.textPrimary}}>Shot preview</span>
          <button onClick={handleClose} style={{background:"none",border:"none",cursor:"pointer",color:C.textSecondary,padding:4}}>
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
          </button>
        </div>

        {/* video */}
        <div onClick={function(){setPlaying(function(v){return !v;});}}
          style={{position:"relative",background:"#000",margin:"12px 20px 0",borderRadius:12,overflow:"hidden",
            aspectRatio:isLandscape?"16/9":"9/16",cursor:"pointer",maxHeight:isLandscape?"none":"55vh"}}>
          <video ref={vidRef} src={videoSrc}
            style={{width:"100%",height:"100%",objectFit:"cover",display:"block"}}
            onLoadedMetadata={handleLoadedMeta}
            onTimeUpdate={handleTimeUpdate}
            onEnded={handleEnded}
            preload="auto" playsInline muted
          />
          {!playing&&(
            <div style={{position:"absolute",inset:0,display:"flex",alignItems:"center",justifyContent:"center",pointerEvents:"none"}}>
              <div style={{width:64,height:64,borderRadius:"50%",background:"rgba(22,20,49,0.72)",backdropFilter:"blur(4px)",display:"flex",alignItems:"center",justifyContent:"center"}}>
                <svg width="26" height="26" viewBox="0 0 24 24" fill={C.textPrimary}><polygon points="5 3 19 12 5 21 5 3"/></svg>
              </div>
            </div>
          )}
        </div>

        {/* controls */}
        <div style={{padding:"12px 20px 0",display:"flex",flexDirection:"column",gap:8}}>
          <div ref={trackRef} onMouseDown={onTrackDown}
            style={{position:"relative",height:6,borderRadius:3,background:"rgba(187,188,214,0.2)",cursor:"pointer"}}>
            <div style={{position:"absolute",top:0,left:0,height:"100%",width:pct+"%",borderRadius:3,background:C.action}}/>
            <div style={{position:"absolute",top:"50%",left:pct+"%",transform:"translate(-50%,-50%)",width:14,height:14,borderRadius:"50%",background:C.textPrimary,boxShadow:"0 0 0 3px rgba(241,102,92,0.35)"}}/>
          </div>
          <div style={{display:"flex",alignItems:"center",gap:12}}>
            <button onClick={function(){
              if(vidRef.current&&vidRef.current.ended){vidRef.current.currentTime=0;setCurrent(0);}
              setPlaying(function(v){return !v;});
            }} style={{background:"none",border:"none",cursor:"pointer",padding:0,display:"flex",alignItems:"center"}}>
              {playing
                ?<svg width="22" height="22" viewBox="0 0 24 24" fill={C.textPrimary}><rect x="6" y="4" width="4" height="16"/><rect x="14" y="4" width="4" height="16"/></svg>
                :<svg width="22" height="22" viewBox="0 0 24 24" fill={C.textPrimary}><polygon points="5 3 19 12 5 21 5 3"/></svg>}
            </button>
            <span style={{fontFamily:mono,fontSize:13,color:C.textSecondary}}>{fmtSec(current)} / {fmtSec(duration)}</span>
          </div>
        </div>

        {/* metadata + download */}
        <div style={{padding:"16px 20px 20px",display:"flex",flexDirection:"column",gap:12}}>
          <div style={{height:1,background:C.bgTertiary}}/>
          <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",gap:16,flexWrap:"wrap"}}>
            <div style={{display:"flex",flexWrap:"wrap",gap:6}}>
              <Tag iconSrc={imgTagCal}   label={shot.date}/>
              <Tag iconSrc={imgTagClock} label={shot.time}/>
              <Tag iconSrc={imgTagTimer} label={shot.dur}/>
              <Tag iconSrc={imgTagUser}  label={shot.user}/>
              <Tag iconSrc={imgTagFile}  label={shot.size}/>
            </div>
            <a href={videoSrc} download target="_blank" rel="noreferrer" style={{textDecoration:"none",flexShrink:0}}>
              <button style={{background:C.action,border:"none",borderRadius:999,padding:"10px 24px",fontFamily:sans,fontWeight:600,fontSize:16,color:C.bgPage,cursor:"pointer",display:"flex",alignItems:"center",gap:10}}>
                <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke={C.bgPage} strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>
                Download
              </button>
            </a>
          </div>
        </div>
      </div>
    </div>
  );
}

// ── Range Slider ──────────────────────────────────────────────────
function RangeSlider(props){
  var lo=props.lo,hi=props.hi,onChange=props.onChange,gridRef=props.gridRef;
  var trackRef=useRef(null),dragging=useRef(null);
  var [sliderW,setSliderW]=useState(null);
  useEffect(function(){
    var el=gridRef&&gridRef.current; if(!el)return;
    function calc(){var gw=el.getBoundingClientRect().width;setSliderW(Math.round((gw-48)/4*2+16));}
    calc(); var ro=new ResizeObserver(calc); ro.observe(el);
    return function(){ro.disconnect();};
  },[gridRef]);
  var fracFromX=useCallback(function(cx){var r=trackRef.current.getBoundingClientRect();return Math.max(0,Math.min(1,(cx-r.left)/r.width));},[]);
  useEffect(function(){
    function onMove(e){if(!dragging.current||!trackRef.current)return;var f=fracFromX(e.clientX);if(dragging.current==="lo")onChange(Math.min(f,hi-0.001),hi);else onChange(lo,Math.max(f,lo+0.001));}
    function onUp(){dragging.current=null;}
    window.addEventListener("mousemove",onMove);window.addEventListener("mouseup",onUp);
    return function(){window.removeEventListener("mousemove",onMove);window.removeEventListener("mouseup",onUp);};
  },[lo,hi,onChange,fracFromX]);
  function ts(pct){return{position:"absolute",top:"50%",left:(pct*100)+"%",transform:"translate(-50%,-50%)",width:20,height:20,borderRadius:"50%",background:C.textPrimary,cursor:"grab",zIndex:2,userSelect:"none",boxShadow:"0 0 0 3px rgba(255,255,255,0.2)"};}
  return(
    <div style={{display:"flex",flexDirection:"column",gap:8,width:sliderW?sliderW+"px":"100%"}}>
      <div ref={trackRef} style={{position:"relative",height:6,borderRadius:3,background:"rgba(187,188,214,0.25)"}}>
        <div style={{position:"absolute",top:0,height:"100%",borderRadius:3,left:(lo*100)+"%",width:((hi-lo)*100)+"%",background:C.textSecondary}}/>
        <div style={ts(lo)} onMouseDown={function(e){e.preventDefault();dragging.current="lo";}}/>
        <div style={ts(hi)} onMouseDown={function(e){e.preventDefault();dragging.current="hi";}}/>
      </div>
      <div style={{display:"flex",justifyContent:"space-between"}}>
        <span style={{fontFamily:sans,fontSize:14,lineHeight:"20px",color:C.textPrimary}}>{fmtMs(TL_START+lo*TL_SPAN)}</span>
        <span style={{fontFamily:sans,fontSize:14,lineHeight:"20px",color:C.textPrimary}}>{fmtMs(TL_START+hi*TL_SPAN)}</span>
      </div>
    </div>
  );
}

// ── Batch Dropdown ────────────────────────────────────────────────
function BatchDropdown(props){
  var [open,setOpen]=useState(false),ref=useRef(null);
  useEffect(function(){function h(e){if(ref.current&&!ref.current.contains(e.target))setOpen(false);}document.addEventListener("mousedown",h);return function(){document.removeEventListener("mousedown",h);};},[]);
  var items=[
    {label:"Download videos",action:function(){setOpen(false);props.onDownload();},icon:<svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke={C.textPrimary} strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>},

  var selectedIds=props.selectedIds,onToggle=props.onToggle,onSelectAll=props.onSelectAll,onDeselectAll=props.onDeselectAll;
  var favIds=props.favIds,onToggleFav=props.onToggleFav;
  var showMeta=props.showMeta,onToggleMeta=props.onToggleMeta;
  var showFavsOnly=props.showFavsOnly,onToggleFavsOnly=props.onToggleFavsOnly;
  var rangeLo=props.rangeLo,rangeHi=props.rangeHi,onRange=props.onRange;
  var onDownload=props.onDownload,onCollection=props.onCollection,onPreview=props.onPreview;
  var count=selectedIds.size;
  var loMs=TL_START+rangeLo*TL_SPAN,hiMs=TL_START+rangeHi*TL_SPAN;
  var gridRef=useRef(null);
  var tabs=["Shots","Attendees","Highlights","Pages","Settings"];
  var visible=SHOTS.filter(function(s){return s.ts>=loMs&&s.ts<=hiMs;}).filter(function(s){return !showFavsOnly||favIds.has(s.id);});
  var allSel=visible.length>0&&visible.every(function(s){return selectedIds.has(s.id);});
  var someSel=!allSel&&visible.some(function(s){return selectedIds.has(s.id);});
  var checkState=allSel?true:someSel?"indeterminate":false;
  function handleCheckbox(){if(allSel)onDeselectAll(visible);else onSelectAll(visible);}
  return(
    <div style={{background:C.bgSecondary,borderRadius:12,padding:"8px 24px 16px",display:"flex",flexDirection:"column",gap:12}}>
      <div style={{display:"flex",alignItems:"center",gap:12,padding:"8px 12px"}}>
        {tabs.map(function(t,i){return(
          <div key={t} style={{minWidth:128,padding:8,textAlign:"center",borderBottom:i===0?"2px solid "+C.textPrimary:"2px solid transparent"}}>
            <span style={{fontFamily:sans,fontWeight:600,fontSize:16,lineHeight:"24px",color:i===0?C.textPrimary:C.textSecondary}}>{t}</span>
          </div>
        );})}
      </div>
      <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",gap:24,padding:"12px 0"}}>
        <div style={{display:"flex",flexDirection:"column",gap:6}}>
          <span style={{fontFamily:mono,fontWeight:700,fontSize:12,lineHeight:"16px",color:C.textPrimary}}>Filter by date</span>
          <RangeSlider lo={rangeLo} hi={rangeHi} onChange={onRange} gridRef={gridRef}/>
        </div>
        <div style={{display:"flex",alignItems:"center",gap:8,flexShrink:0}}>
          <div style={{border:"1px solid "+C.action,borderRadius:999,padding:"8px 16px",display:"flex",alignItems:"center",gap:12}}>
            <FigmaIcon src={imgUpload} size={20}/>
            <span style={{fontFamily:sans,fontWeight:600,fontSize:16,color:C.action}}>Upload</span>
          </div>
          <BatchDropdown count={count} onDownload={onDownload} onCollection={onCollection}/>
        </div>
      </div>
      <div style={{display:"flex",alignItems:"center",gap:24}}>
        <Toggle active={showMeta}     onToggle={onToggleMeta}     label="Show shot metadata"/>
        <Toggle active={showFavsOnly} onToggle={onToggleFavsOnly} label="Favorites only"/>
        <CheckboxField checked={checkState} onClick={handleCheckbox} label={"Select all ("+visible.length+")"}/>
      </div>
      {visible.length>0?(
        <div ref={gridRef} style={{display:"grid",gridTemplateColumns:"repeat(4, 1fr)",gap:16}}>
          {visible.map(function(shot){return(
            <ShotCard key={shot.id} shot={shot}
              selected={selectedIds.has(shot.id)} onToggle={function(){onToggle(shot.id);}}
              onPreview={function(){onPreview(shot);}}
              fav={favIds.has(shot.id)} onToggleFav={function(){onToggleFav(shot.id);}}
              showMeta={showMeta}/>
          );})}
        </div>
      ):(
        <div ref={gridRef} style={{textAlign:"center",padding:"48px 0",color:C.textSecondary,fontFamily:sans,fontSize:16}}>No shots in this time range</div>
      )}
    </div>
  );
}

// ── App ───────────────────────────────────────────────────────────
function App(){
  var [selectedIds,   setSelectedIds]   = useState(new Set());
  var [favIds,        setFavIds]        = useState(new Set());
  var [showMeta,      setShowMeta]      = useState(true);
  var [showFavsOnly,  setShowFavsOnly]  = useState(false);
  var [rangeLo,       setRangeLo]       = useState(0);
  var [rangeHi,       setRangeHi]       = useState(1);
  var [showDlModal,   setShowDlModal]   = useState(false);
  var [showHighlight, setShowHighlight] = useState(false);
  var [previewShot,   setPreviewShot]   = useState(null);

  function toggleCard(id){setSelectedIds(function(p){var n=new Set(p);n.has(id)?n.delete(id):n.add(id);return n;});}
  function toggleFav(id){setFavIds(function(p){var n=new Set(p);n.has(id)?n.delete(id):n.add(id);return n;});}
  var selectAll  =useCallback(function(shots){setSelectedIds(function(p){var n=new Set(p);shots.forEach(function(s){n.add(s.id);});return n;});},[]);
  var deselectAll=useCallback(function(shots){setSelectedIds(function(p){var n=new Set(p);shots.forEach(function(s){n.delete(s.id);});return n;});},[]);
  var handleRange=useCallback(function(lo,hi){setRangeLo(lo);setRangeHi(hi);},[]);

  return(
    <div style={{display:"flex",alignItems:"flex-start",minHeight:"100vh",background:C.bgPage,fontFamily:sans}}>
      <Sidebar/>
      <div style={{flex:1,display:"flex",flexDirection:"column",gap:10,padding:"24px 16px",overflowY:"auto",boxSizing:"border-box"}}>
        <EventSummary/>
        <ShotsPanel
          selectedIds={selectedIds}   onToggle={toggleCard}
          onSelectAll={selectAll}     onDeselectAll={deselectAll}
          favIds={favIds}             onToggleFav={toggleFav}
          showMeta={showMeta}         onToggleMeta={function(){setShowMeta(function(v){return !v;});}}
          showFavsOnly={showFavsOnly} onToggleFavsOnly={function(){setShowFavsOnly(function(v){return !v;});}}
          rangeLo={rangeLo}           rangeHi={rangeHi} onRange={handleRange}
          onDownload={function(){setShowDlModal(true);}}
          onCollection={function(){setShowHighlight(true);}}
          onPreview={function(shot){setPreviewShot(shot);}}
        />
      </div>
      {previewShot   && <PreviewModal   shot={previewShot}   onClose={function(){setPreviewShot(null);}}/>}
      {showHighlight && <HighlightModal selectedIds={selectedIds} onClose={function(){setShowHighlight(false);}}/>}
      {showDlModal   && <DownloadModal  selectedIds={selectedIds} onConfirm={function(){setShowDlModal(false);}} onCancel={function(){setShowDlModal(false);}}/>}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(React.createElement(App));
</script>
</body>
</html>
