// ── Bar chart ──────────────────────────────────────────────────────
function BarChart({data,labels,height}){
  var W=600,H=height||64,gap=4,n=data.length;
  var mx=Math.max.apply(null,data)||1;
  var bw=Math.floor((W-(n-1)*gap)/n);
  return(
    <div style={{width:"100%"}}>
      <svg viewBox={"0 0 "+W+" "+H} style={{width:"100%",height:H,display:"block"}} preserveAspectRatio="none">
        {data.map(function(v,i){
          var bh=Math.max(3,Math.round((v/mx)*(H-6)));
          return <rect key={i} x={i*(bw+gap)} y={H-bh} width={bw} height={bh} rx={3}
            fill={i===n-1?C.action:C.bgTertiary}/>;
        })}
      </svg>
      {labels&&<div style={{display:"flex",justifyContent:"space-between",marginTop:3}}>
        {labels.filter(function(_,i){return i%3===0;}).map(function(l,i){return(
          <span key={i} style={{fontFamily:mono,fontSize:12,color:C.textMuted}}>{l}</span>
        );})}
      </div>}
    </div>
  );
}

// ── Hub: Event Status Dropdown ─────────────────────────────────────
var STATUS_OPTIONS=[{value:"published",label:"Published",bg:C.action,textColor:C.bgPage},{value:"draft",label:"Draft",bg:"#a3a19f",textColor:C.bgPage},{value:"cancelled",label:"Cancelled",bg:"#750000",textColor:C.textPrimary}];
function EventStatusDropdown(){
  var [status,setStatus]=useState("published");
  var [open,setOpen]=useState(false);
  var ref=useRef(null);
  useEffect(function(){function h(e){if(ref.current&&!ref.current.contains(e.target))setOpen(false);}document.addEventListener("mousedown",h);return function(){document.removeEventListener("mousedown",h);};},[]);
  var current=STATUS_OPTIONS.find(function(o){return o.value===status;})||STATUS_OPTIONS[0];
  return(<div ref={ref} style={{position:"relative",width:241,flexShrink:0}}>
    <div onClick={function(){setOpen(function(v){return !v;});}} style={{background:current.bg,borderRadius:open?"8px 8px 0 0":"8px",display:"flex",alignItems:"center",justifyContent:"space-between",padding:"4px 8px 4px 12px",cursor:"pointer",userSelect:"none"}}>
      <span style={{fontFamily:sans,fontSize:16,lineHeight:"24px",color:current.textColor}}>{current.label}</span>
      <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke={current.textColor} strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round" style={{transition:"transform .2s",transform:open?"rotate(180deg)":"rotate(0deg)"}}><polyline points="6 9 12 15 18 9"/></svg>
    </div>
    {open&&<div style={{position:"absolute",top:"100%",left:0,width:241,background:C.bgTertiary,borderRadius:"0 0 8px 8px",zIndex:50,overflow:"hidden",boxShadow:"0 8px 24px rgba(0,0,0,0.3)"}}>
      {STATUS_OPTIONS.map(function(opt){var isActive=opt.value===status;return(<div key={opt.value} onClick={function(){setStatus(opt.value);setOpen(false);}} style={{padding:"8px 12px",cursor:"pointer",background:isActive?"rgba(187,188,214,0.15)":"transparent"}} onMouseEnter={function(e){e.currentTarget.style.background="rgba(187,188,214,0.15)";}} onMouseLeave={function(e){e.currentTarget.style.background=isActive?"rgba(187,188,214,0.15)":"transparent";}}><span style={{fontFamily:sans,fontSize:14,color:C.textPrimary}}>{opt.label}</span></div>);})}
    </div>}
  </div>);}

function ShotsPanel({selectedIds,onToggle,onSelectAll,onDeselectAll,favIds,onToggleFav,showMeta,onToggleMeta,showFavsOnly,onToggleFavsOnly,rangeLo,rangeHi,onRange,onDownload,onCollection,onPreview,discardedIds,onDiscard,onRecover,onBatchDiscard,activeTab,onTabChange,onNewHighlight,highlights,onEditHighlight,onDeleteHighlight}){

  var loMs=TL_START+rangeLo*TL_SPAN,hiMs=TL_START+rangeHi*TL_SPAN;
  var gridRef=useRef(null);

  var activeShots=SHOTS.filter(function(s){return !discardedIds.has(s.id);}).filter(function(s){return s.ts>=loMs&&s.ts<=hiMs;}).filter(function(s){return !showFavsOnly||favIds.has(s.id);});
  var discardedShots=SHOTS.filter(function(s){return discardedIds.has(s.id);});
  var visible=innerTab==="shots"?activeShots:discardedShots;
  var allSel=visible.length>0&&visible.every(function(s){return selectedIds.has(s.id);});
  var someSel=!allSel&&visible.some(function(s){return selectedIds.has(s.id);});
  var checkState=allSel?true:someSel?"indeterminate":false;
  function handleCheckbox(){if(allSel)onDeselectAll(visible);else onSelectAll(visible);}
  return(<div style={{background:C.bgSecondary,borderRadius:12,padding:"8px 24px 16px",display:"flex",flexDirection:"column",gap:12,flex:1}}>
    <div style={{display:"flex",alignItems:"center",gap:12,padding:"8px 12px"}}>{tabs.map(function(t){var active=t===activeTab;return(<div key={t} onClick={function(){onTabChange(t);}} style={{minWidth:128,padding:8,textAlign:"center",cursor:"pointer",borderBottom:active?"2px solid "+C.textPrimary:"2px solid transparent"}}><span style={{fontFamily:sans,fontWeight:600,fontSize:16,lineHeight:"24px",color:active?C.textPrimary:C.textSecondary}}>{t}</span></div>);})}</div>
    {activeTab==="Overview"?<EventOverviewPanel onTabChange={onTabChange}/>
    :activeTab==="Highlights"?<HighlightsPanel onNewHighlight={onNewHighlight} highlights={highlights} onEdit={onEditHighlight} onDelete={onDeleteHighlight}/>
    :activeTab==="Settings"?<SettingsPanel/>
    :activeTab==="Attendees"?<AttendeesPanel/>
    :activeTab==="Public pages"?<PublicPagesPanel highlights={highlights}/>
    :<>
      <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",gap:24,padding:"12px 0"}}>
        <div style={{display:"flex",flexDirection:"column",gap:6}}><span style={{fontFamily:mono,fontWeight:700,fontSize:12,lineHeight:"16px",color:C.textPrimary}}>Filter by date</span><RangeSlider lo={rangeLo} hi={rangeHi} onChange={onRange} gridRef={gridRef}/></div>
        <div style={{display:"flex",alignItems:"center",gap:8,flexShrink:0}}><div style={{border:"1px solid "+C.action,borderRadius:999,padding:"8px 16px",display:"flex",alignItems:"center",gap:12,cursor:"pointer"}}><IUpload size={20}/><span style={{fontFamily:sans,fontWeight:600,fontSize:16,color:C.action}}>Upload</span></div><BatchDropdown count={count} onDownload={onDownload} onCollection={onCollection} onDiscard={onBatchDiscard}/></div>
      </div>
      <div style={{display:"flex",alignItems:"center",gap:24,flexWrap:"wrap"}}>
        <Toggle active={showMeta} onToggle={onToggleMeta} label="Show shot metadata"/>
        <Toggle active={showFavsOnly} onToggle={onToggleFavsOnly} label="Favorites only"/>
        <CheckboxField checked={checkState} onClick={handleCheckbox} label={"Select all ("+visible.length+")"}/>
        <div onClick={function(){setInnerTab(function(t){return t==="shots"?"discarded":"shots";});}} style={{display:"flex",alignItems:"center",gap:8,cursor:"pointer",padding:"4px 12px",borderRadius:8,background:innerTab==="discarded"?C.bgTertiary:"transparent",transition:"background 0.15s",userSelect:"none",marginLeft:"auto"}}><ITrash color={innerTab==="discarded"?C.textPrimary:C.textMuted} size={14}/><span style={{fontFamily:sans,fontSize:14,lineHeight:"20px",color:innerTab==="discarded"?C.textPrimary:C.textMuted,whiteSpace:"nowrap"}}>Discarded shots</span>{discardedShots.length>0&&(<div style={{background:C.action,borderRadius:999,minWidth:18,height:18,display:"flex",alignItems:"center",justifyContent:"center",padding:"0 5px"}}><span style={{fontFamily:mono,fontWeight:700,fontSize:10,color:C.bgPage}}>{discardedShots.length}</span></div>)}</div>

  </div>);}

function HubPage({event,onGoToEvents,onNav,defaultTab}){
  var [page,setPage]=useState("main");
  var [editTarget,setEditTarget]=useState(null);
  var [selectedIds,setSelectedIds]=useState(new Set());
  var [favIds,setFavIds]=useState(new Set());
  var [discardedIds,setDiscardedIds]=useState(new Set());
  var [showMeta,setShowMeta]=useState(true);
  var [showFavsOnly,setShowFavsOnly]=useState(false);
  var [rangeLo,setRangeLo]=useState(0);
  var [rangeHi,setRangeHi]=useState(1);
  var [showDlModal,setShowDlModal]=useState(false);
  var [showArrangeModal,setShowArrangeModal]=useState(false);
  var [arrangeIds,setArrangeIds]=useState(new Set());
  var [previewShot,setPreviewShot]=useState(null);
  var [activeTab,setActiveTab]=useState(defaultTab||"Overview");
  var [highlights,setHighlights]=useState(HIGHLIGHTS_SEED);
  function toggleCard(id){setSelectedIds(function(p){var n=new Set(p);n.has(id)?n.delete(id):n.add(id);return n;});}
  function toggleFav(id){setFavIds(function(p){var n=new Set(p);n.has(id)?n.delete(id):n.add(id);return n;});}
  function discardShot(id){setDiscardedIds(function(p){var n=new Set(p);n.add(id);return n;});setSelectedIds(function(p){var n=new Set(p);n.delete(id);return n;});}
  function recoverShot(id){setDiscardedIds(function(p){var n=new Set(p);n.delete(id);return n;});}
  function batchDiscard(){setDiscardedIds(function(p){var n=new Set(p);selectedIds.forEach(function(id){n.add(id);});return n;});setSelectedIds(new Set());}
  function deleteHighlight(id){setHighlights(function(p){return p.filter(function(h){return h.id!==id;});});}
  var selectAll=useCallback(function(shots){setSelectedIds(function(p){var n=new Set(p);shots.forEach(function(s){n.add(s.id);});return n;});},[]);
  var deselectAll=useCallback(function(shots){setSelectedIds(function(p){var n=new Set(p);shots.forEach(function(s){n.delete(s.id);});return n;});},[]);
  var handleRange=useCallback(function(lo,hi){setRangeLo(lo);setRangeHi(hi);},[]);
  if(page==="new-highlight"||page==="edit-highlight"){return <NewHighlightPage onCancel={function(){setPage("main");setEditTarget(null);}} onPublish={function(){setActiveTab("Highlights");setPage("main");setEditTarget(null);}} favIds={favIds} onToggleFav={toggleFav} editHighlight={editTarget}/>;}
  return(<div style={{display:"flex",alignItems:"stretch",height:"100vh",background:C.bgPage,fontFamily:sans}}>
    <Sidebar activeScreen="events" onNav={onNav}/>
    <div style={{flex:1,display:"flex",flexDirection:"column",gap:10,padding:"24px 16px",overflowY:"auto",boxSizing:"border-box",minHeight:"100%"}}>
      <EventSummary event={event}/>
      <ShotsPanel selectedIds={selectedIds} onToggle={toggleCard} onSelectAll={selectAll} onDeselectAll={deselectAll} favIds={favIds} onToggleFav={toggleFav} discardedIds={discardedIds} onDiscard={discardShot} onRecover={recoverShot} onBatchDiscard={batchDiscard} showMeta={showMeta} onToggleMeta={function(){setShowMeta(function(v){return !v;});}} showFavsOnly={showFavsOnly} onToggleFavsOnly={function(){setShowFavsOnly(function(v){return !v;});}} rangeLo={rangeLo} rangeHi={rangeHi} onRange={handleRange} onDownload={function(){setShowDlModal(true);}} onCollection={function(){setArrangeIds(new Set(selectedIds));setShowArrangeModal(true);}} onPreview={function(shot){setPreviewShot(shot);}} activeTab={activeTab} onTabChange={setActiveTab} onNewHighlight={function(){setPage("new-highlight");}} onEditHighlight={function(h){setEditTarget(h);setPage("edit-highlight");}} onDeleteHighlight={deleteHighlight} highlights={highlights}/>
    </div>
    {previewShot&&<PreviewModal shot={previewShot} onClose={function(){setPreviewShot(null);}} onDiscard={discardShot}/>}
    {showDlModal&&<DownloadModal selectedIds={selectedIds} onConfirm={function(){setShowDlModal(false);}} onCancel={function(){setShowDlModal(false);}}/>}
    {showArrangeModal&&<ArrangeModal selectedIds={arrangeIds} isEdit={false} editName="" editFeatured={false} source="shots" onBack={function(){setShowArrangeModal(false);}} onPublish={function(){setShowArrangeModal(false);setActiveTab("Highlights");}}/>}
  </div>);}

        </div>
        <div style={{display:"flex",flexDirection:"column",gap:4}}>
          <span style={{fontFamily:mono,fontWeight:700,fontSize:11,color:C.textSecondary}}>Phone <span style={{fontWeight:400,color:C.textMuted}}>(optional)</span></span>
          {inp(phone,setPhone,phoneFocused,setPhoneFocused,"+44 7700 000000",null)}
        </div>
      </div>

      {/* save button */}
      <button onClick={function(){setSaved(true);}} style={{background:saved?C.bgTertiary:C.action,border:"none",borderRadius:999,padding:"10px 16px",fontFamily:sans,fontWeight:600,fontSize:15,color:saved?C.textSecondary:C.bgPage,cursor:"pointer",transition:"background 0.2s,color 0.2s",display:"flex",alignItems:"center",justifyContent:"center",gap:8}}>
        {saved
          ?<><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round"><polyline points="20 6 9 17 4 12"/></svg>Saved</>
          :"Save changes"
        }
      </button>

      {/* divider */}
      <div style={{borderTop:"1px solid "+C.border}}/>

      {/* email notifications */}
      <div style={{display:"flex",flexDirection:"column",gap:6}}>
        <Toggle active={emailNotifs} onToggle={function(){setEmailNotifs(function(v){return !v;});}} label="Email notifications"/>
        <span style={{fontFamily:sans,fontSize:13,lineHeight:"18px",color:C.textSecondary,paddingLeft:38}}>Receive updates about your events and team activity.</span>
      </div>

      {/* divider */}
      <div style={{borderTop:"1px solid "+C.border}}/>

      {/* sign out + delete */}
      <div style={{display:"flex",flexDirection:"column",gap:12}}>
        <button style={{border:"1px solid "+C.border,background:"none",borderRadius:999,padding:"10px 16px",fontFamily:sans,fontWeight:600,fontSize:15,color:C.textSecondary,cursor:"pointer",display:"flex",alignItems:"center",justifyContent:"center",gap:8}}>
          <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/></svg>
          Sign out
        </button>
        <button onClick={function(){setShowDelete(true);}} style={{background:"none",border:"none",fontFamily:sans,fontSize:13,color:C.textMuted,cursor:"pointer",textDecoration:"underline",textUnderlineOffset:3,padding:"4px 0"}}>
          Delete account
        </button>
      </div>

      {/* spacer */}
      <div style={{flex:1}}/>

      {/* support strip */}
      <div style={{background:C.bgTertiary,borderRadius:16,padding:"16px 20px",display:"flex",alignItems:"center",gap:6,flexWrap:"wrap"}}>
        <span style={{fontFamily:sans,fontSize:15,lineHeight:"24px",color:C.textSecondary}}>Need help?</span>
        <a href="mailto:support@sureshot.app" style={{fontFamily:sans,fontSize:15,lineHeight:"24px",color:C.textPrimary,textDecoration:"underline",textUnderlineOffset:3,cursor:"pointer"}}>Contact support</a>
      </div>

    </div>
  );
}

function AccountPage({onNav}){
  var [members,setMembers]=useState(TEAM_MEMBERS);
  var [showInvite,setShowInvite]=useState(false);
  var [removeTarget,setRemoveTarget]=useState(null);
  var [logo,setLogo]=useState(COMPANY.logo);
  var [showEditCompany,setShowEditCompany]=useState(false);
  function removeMember(id){setMembers(function(p){return p.filter(function(m){return m.id!==id;});});}

  var cols=[
    {key:"user",  label:"USER",  flex:1},
    {key:"role",  label:"ROLE",  w:90},
    {key:"action",label:"",      w:40},
  ];

  return(
    <div style={{display:"flex",alignItems:"flex-start",minHeight:"100vh",background:C.bgPage,fontFamily:sans}}>
      <Sidebar activeScreen="accounts" onNav={onNav}/>
      {showInvite&&<InviteUserModal onClose={function(){setShowInvite(false);}}/>}
      {removeTarget&&<RemoveMemberModal member={removeTarget} onClose={function(){setRemoveTarget(null);}} onConfirm={removeMember}/>}
      {showEditCompany&&<EditCompanyModal company={COMPANY} logo={logo} onClose={function(){setShowEditCompany(false);}} onSave={function(updated){setLogo(updated.logo);setShowEditCompany(false);}}/>}

      <div style={{flex:1,display:"flex",flexDirection:"column",gap:12,padding:"24px 16px",boxSizing:"border-box",minHeight:"100vh"}}>

        {/* ── Page header ── */}
        <div style={{background:C.bgSecondary,borderRadius:24,padding:24,display:"flex",alignItems:"center",justifyContent:"space-between"}}>
          <span style={{fontFamily:sans,fontWeight:600,fontSize:32,lineHeight:"40px",color:C.textPrimary}}>Account</span>
          <svg width="48" height="48" viewBox="0 0 48 48" fill="none">
            <circle cx="24" cy="18" r="7" fill="none" stroke={C.action} strokeWidth="2.5"/>
            <path d="M8 40c0-8.837 7.163-16 16-16s16 7.163 16 16" fill="none" stroke={C.action} strokeWidth="2.5" strokeLinecap="round"/>
            <circle cx="24" cy="18" r="3" fill={C.action}/>
          </svg>
        </div>

        {/* ── Two columns ── */}
        <div style={{display:"flex",gap:12,flex:1,alignItems:"stretch"}}>

          {/* Left: your account */}
          <div style={{flex:"0 0 50%",maxWidth:"50%"}}>
            <MyAccountPanel/>
          </div>

          {/* Right: company + team */}
          <div style={{flex:"0 0 50%",maxWidth:"50%",display:"flex",flexDirection:"column",gap:12}}>

            {/* company strip */}
            <div style={{background:C.bgSecondary,borderRadius:24,padding:24,display:"flex",alignItems:"center",gap:20}}>
              <div style={{width:64,height:64,borderRadius:"50%",overflow:"hidden",background:C.bgTertiary,flexShrink:0}}>
                <img src={logo} alt="Company logo" style={{width:"100%",height:"100%",objectFit:"cover",display:"block"}}/>
              </div>
              <div style={{display:"flex",flexDirection:"column",gap:4,flex:1,minWidth:0}}>
                <span style={{fontFamily:sans,fontWeight:800,fontSize:22,lineHeight:"28px",color:C.textPrimary,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{COMPANY.name}</span>
                <span style={{fontFamily:sans,fontSize:14,color:C.textSecondary}}>hello@luminaryevents.com</span>
              </div>
              <IconBtn title="Edit company" onClick={function(){setShowEditCompany(true);}}><IEdit color={C.textPrimary} size={16}/></IconBtn>
            </div>

            {/* team members panel */}
            <div style={{background:C.bgSecondary,borderRadius:24,padding:24,display:"flex",flexDirection:"column",gap:20,flex:1}}>
              <div style={{display:"flex",alignItems:"center",justifyContent:"space-between"}}>
                <div style={{display:"flex",flexDirection:"column",gap:4}}>
                  <span style={{fontFamily:sans,fontWeight:600,fontSize:20,lineHeight:"28px",color:C.textPrimary}}>Team members</span>
                  <span style={{fontFamily:sans,fontSize:14,color:C.textSecondary}}>{members.length} {members.length===1?"member":"members"}</span>
                </div>
                <button onClick={function(){setShowInvite(true);}} style={{background:C.action,border:"none",borderRadius:999,padding:"8px 16px",display:"flex",alignItems:"center",gap:10,cursor:"pointer"}}>
                  <IUserPlus size={20}/>
                  <span style={{fontFamily:sans,fontWeight:600,fontSize:15,color:C.bgPage,whiteSpace:"nowrap"}}>Invite user</span>
                </button>
              </div>

              <div style={{display:"flex",flexDirection:"column"}}>
                <div style={{display:"flex",alignItems:"center",borderBottom:"1px solid "+C.border,paddingBottom:8}}>
                  {cols.map(function(col){return(
                    <div key={col.key} style={{width:col.w||undefined,flex:col.flex||undefined,flexShrink:col.flex?undefined:0,padding:"0 4px"}}>
                      {col.label&&<span style={{fontFamily:mono,fontWeight:700,fontSize:14,color:C.textSecondary}}>{col.label}</span>}
                    </div>

                {members.map(function(m){return(
                  <div key={m.id} style={{display:"flex",alignItems:"center",borderBottom:"1px solid "+C.border,paddingTop:12,paddingBottom:12}}>

                      <div style={{display:"flex",flexDirection:"column",gap:2,minWidth:0}}>
                        <span style={{fontFamily:sans,fontSize:14,lineHeight:"20px",color:m.invited?C.textMuted:C.textPrimary,fontWeight:600,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{m.name}</span>
                        <span style={{fontFamily:mono,fontWeight:700,fontSize:12,lineHeight:"18px",color:C.textSecondary,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{m.email}</span>
                      </div>
                    </div>
                    <div style={{width:90,flexShrink:0,padding:"0 4px"}}>
                      {m.invited
                        ?<div style={{display:"inline-flex",alignItems:"center",borderRadius:4,padding:"2px 8px",background:"transparent",border:"1px solid "+C.border}}>
                          <span style={{fontFamily:sans,fontSize:12,color:C.textMuted}}>Invited</span>
                        </div>
                        :<div style={{display:"inline-flex",alignItems:"center",borderRadius:4,padding:"2px 8px",background:m.role==="Admin"?"rgba(241,102,92,0.15)":"transparent",border:"1px solid "+(m.role==="Admin"?C.action:C.border)}}>
                          <span style={{fontFamily:sans,fontSize:12,color:m.role==="Admin"?C.action:C.textSecondary}}>{m.role}</span>
                        </div>
                      }
                    </div>
                    <div style={{width:40,flexShrink:0,display:"flex",justifyContent:"flex-end"}}>
                      {m.invited
                        ?<IconBtn title="Resend invite" onClick={function(){}}><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke={C.textSecondary} strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><line x1="22" y1="2" x2="11" y2="13"/><polygon points="22 2 15 22 11 13 2 9 22 2"/></svg></IconBtn>
                        :m.role!=="Admin"&&<IconBtn onClick={function(){setRemoveTarget(m);}}><IX color={C.action} size={16}/></IconBtn>
                      }
                    </div>
                  </div>
                );})}
              </div>
            </div>

          </div>
        </div>
      </div>
    </div>
  );
}


function CreateEventPage({onNav,onCreated}){
  var fileRef=useRef(null);
  var [cover,setCover]=useState(null);
  var [coverHov,setCoverHov]=useState(false);
  var [name,setName]=useState("");
  var [nameFocused,setNameFocused]=useState(false);
  var [location,setLocation]=useState("");
  var [locationFocused,setLocationFocused]=useState(false);
  var [desc,setDesc]=useState("");
  var [descFocused,setDescFocused]=useState(false);
  var [privateEvt,setPrivateEvt]=useState(false);
  var [instantShare,setInstantShare]=useState(false);
  var [publicPage,setPublicPage]=useState(false);
  var [saved,setSaved]=useState(null); // null | "draft" | "published"

  function handleFile(e){
    var f=e.target.files&&e.target.files[0];
    if(!f)return;
    var r=new FileReader();
    r.onload=function(ev){setCover(ev.target.result);};
    r.readAsDataURL(f);
  }

  function handleSave(asDraft){
    setSaved(asDraft?"draft":"published");
  }

  if(saved){
    return(
      <div style={{display:"flex",alignItems:"flex-start",minHeight:"100vh",background:C.bgPage,fontFamily:sans}}>
        <Sidebar activeScreen="events" onNav={onNav}/>
        <div style={{flex:1,display:"flex",alignItems:"center",justifyContent:"center",minHeight:"100vh"}}>
          <div style={{background:C.bgSecondary,borderRadius:24,padding:40,display:"flex",flexDirection:"column",alignItems:"center",gap:24,width:420,textAlign:"center",animation:"fadeUp .4s cubic-bezier(.34,1.1,.64,1) both"}}>
            <div style={{background:C.action,borderRadius:"50%",width:64,height:64,display:"flex",alignItems:"center",justifyContent:"center",flexShrink:0}}>
              <svg width="32" height="32" viewBox="0 0 24 24" fill="none" stroke={C.bgPage} strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round"><polyline points="20 6 9 17 4 12"/></svg>
            </div>
            <div style={{display:"flex",flexDirection:"column",gap:8}}>
              <p style={{fontFamily:sans,fontWeight:800,fontSize:24,lineHeight:"30px",color:C.textPrimary,margin:0}}>{saved==="draft"?"Draft saved!":"Event created!"}</p>
              <p style={{fontFamily:sans,fontSize:16,lineHeight:"24px",color:C.textSecondary,margin:0}}>{saved==="draft"?"Your event has been saved as a draft.":"Your event is now live for attendees."}</p>
            </div>
            <button onClick={function(){onNav("events");}} style={{width:"100%",background:C.action,border:"none",borderRadius:999,padding:"16px 24px",fontFamily:sans,fontWeight:600,fontSize:18,color:C.bgPage,cursor:"pointer"}}>Go to Events</button>
          </div>
        </div>
      </div>
    );
  }

  // reuse existing DateTimePicker & TimezonePicker from SettingsPanel
  var inp=function(val,setVal,focused,setFocused,placeholder,multiline,maxLen){
    var base={border:"2px solid "+(focused?C.textPrimary:C.border),borderRadius:16,padding:"12px 24px",fontFamily:sans,fontSize:16,lineHeight:"24px",background:C.bgTertiary,outline:"none",width:"100%",color:C.textPrimary,resize:"none",transition:"border-color 0.15s"};
    return multiline
      ?<textarea value={val} onChange={function(e){setVal(e.target.value);}} placeholder={placeholder} maxLength={maxLen} onFocus={function(){setFocused(true);}} onBlur={function(){setFocused(false);}} style={Object.assign({},base,{height:192,minHeight:128})}/>
      :<input value={val} onChange={function(e){setVal(e.target.value);}} placeholder={placeholder} maxLength={maxLen} onFocus={function(){setFocused(true);}} onBlur={function(){setFocused(false);}} style={base}/>;
  };

  return(
    <div style={{display:"flex",alignItems:"flex-start",minHeight:"100vh",background:C.bgPage,fontFamily:sans}}>
      <Sidebar activeScreen="events" onNav={onNav}/>
      <div style={{flex:1,padding:"24px 16px",boxSizing:"border-box"}}>
        <div style={{background:C.bgSecondary,borderRadius:16,padding:"16px 24px 24px",display:"flex",flexDirection:"column",gap:24}}>

          <span style={{fontFamily:sans,fontWeight:800,fontSize:24,lineHeight:"30px",color:C.textPrimary}}>Create event</span>

          {/* cover image */}
          <div style={{position:"relative",width:361,height:192,borderRadius:24,overflow:"hidden",background:C.bgPage,flexShrink:0,cursor:"pointer"}} onClick={function(){fileRef.current&&fileRef.current.click();}} onMouseEnter={function(){setCoverHov(true);}} onMouseLeave={function(){setCoverHov(false);}}>
            {/* decorative sureshot vectors in bg */}
            <svg style={{position:"absolute",top:"50%",transform:"translateY(-50%)",left:8,opacity:0.18}} width="26" height="135" viewBox="0 0 178 135" fill="none"><path d="M147.553 68.4289C147.553 94.1164 136.943 117.486 119.592 135V1.8578C136.943 19.3713 147.553 42.7414 147.553 68.4289Z" fill="#F1665C"/><path d="M178 66.5711C178 92.2586 168.333 115.629 152.524 133.142V0C168.333 17.5135 178 40.8836 178 66.5711Z" fill="#F1665C"/></svg>
            <svg style={{position:"absolute",top:"50%",transform:"translateY(-50%)",right:8,opacity:0.18}} width="26" height="135" viewBox="0 0 178 135" fill="none"><path d="M30.447 68.4289C30.447 94.1164 41.057 117.486 58.408 135V1.8578C41.057 19.3713 30.447 42.7414 30.447 68.4289Z" fill="#F1665C"/><path d="M0 66.5711C0 92.2586 9.667 115.629 25.476 133.142V0C9.667 17.5135 0 40.8836 0 66.5711Z" fill="#F1665C"/></svg>
            {cover
              ?<img src={cover} alt="" style={{position:"absolute",inset:0,width:"100%",height:"100%",objectFit:"cover",display:"block"}}/>
              :null
            }
            <div style={{position:"absolute",inset:0,display:"flex",alignItems:"center",justifyContent:"center"}}>
              <div style={{border:"1px solid "+C.textPrimary,borderRadius:999,display:"flex",alignItems:"center",gap:12,padding:"8px 16px",background:cover?"rgba(22,20,49,0.6)":"transparent",backdropFilter:cover?"blur(4px)":"none",transition:"background 0.15s"}}>
                <IPlus color={C.textPrimary} size={24}/>
                <span style={{fontFamily:sans,fontWeight:600,fontSize:16,color:C.textPrimary,whiteSpace:"nowrap"}}>{cover?"Change cover":"Add cover"}</span>
              </div>
            </div>
            <input ref={fileRef} type="file" accept="image/*" onChange={handleFile} style={{display:"none"}}/>
          </div>

          {/* event name */}
          <div style={{display:"flex",flexDirection:"column",gap:4}}>
            <span style={{fontFamily:mono,fontWeight:700,fontSize:12,color:C.textPrimary}}>Event name</span>
            <span style={{fontFamily:sans,fontSize:12,color:C.textPrimary}}>60 characters maximum</span>
            {inp(name,setName,nameFocused,setNameFocused,"Event name",false,60)}
          </div>

          {/* location */}
          <div style={{display:"flex",flexDirection:"column",gap:4}}>
            <span style={{fontFamily:mono,fontWeight:700,fontSize:12,color:C.textPrimary}}>Location</span>
            {inp(location,setLocation,locationFocused,setLocationFocused,"Event location",false,200)}
          </div>

          {/* date/time row */}
          <div style={{display:"flex",alignItems:"flex-end",gap:16,flexWrap:"wrap"}}>
            <div style={{width:"25%",flexShrink:0,position:"relative"}}>
              <DateTimePicker label="Date & Time" hint="Period the event will be live"/>
            </div>
            <div style={{marginBottom:4,flexShrink:0}}><TimezonePicker/></div>
          </div>

          {/* description */}
          <div style={{display:"flex",flexDirection:"column",gap:4}}>
            <span style={{fontFamily:mono,fontWeight:700,fontSize:12,color:C.textPrimary}}>Event description</span>
            <span style={{fontFamily:sans,fontSize:12,color:C.textPrimary}}>300 characters maximum</span>
            {inp(desc,setDesc,descFocused,setDescFocused,"Describe your event",true,300)}
          </div>

          {/* public page */}
          <div style={{display:"flex",flexDirection:"column",gap:0,border:"1px solid "+(publicPage?C.action:C.border),borderRadius:16,overflow:"hidden",transition:"border-color 0.2s"}}>
            <div onClick={function(){setPublicPage(function(v){return !v;});}} style={{display:"flex",alignItems:"center",justifyContent:"space-between",padding:"14px 20px",cursor:"pointer",background:publicPage?"rgba(241,102,92,0.07)":"transparent",transition:"background 0.2s",userSelect:"none"}}>
              <div style={{display:"flex",alignItems:"center",gap:12}}>
                <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke={publicPage?C.action:C.textSecondary} strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><circle cx="12" cy="12" r="10"/><line x1="2" y1="12" x2="22" y2="12"/><path d="M12 2a15.3 15.3 0 0 1 4 10 15.3 15.3 0 0 1-4 10 15.3 15.3 0 0 1-4-10 15.3 15.3 0 0 1 4-10z"/></svg>
                <span style={{fontFamily:sans,fontWeight:600,fontSize:16,color:publicPage?C.textPrimary:C.textSecondary,transition:"color 0.2s"}}>Create a public page</span>
              </div>
              <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke={C.textSecondary} strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round" style={{transition:"transform 0.2s",transform:publicPage?"rotate(180deg)":"rotate(0deg)"}}><polyline points="6 9 12 15 18 9"/></svg>
            </div>
            {publicPage&&<div style={{padding:"0 20px 20px",display:"flex",flexDirection:"column",gap:20}}>
              <div style={{height:1,background:C.border}}/>
              <p style={{fontFamily:sans,fontSize:15,lineHeight:"22px",color:C.textSecondary,margin:0}}>A public page lets anyone submit footage without downloading the app. Share the link and anyone with it can upload videos during the window you set. You can edit or remove it at any time.</p>
              <div style={{width:"25%",flexShrink:0,position:"relative"}}>
                <DateTimePicker label="Video upload window" hint="When the public page accepts submissions"/>
              </div>
            </div>}
          </div>

          {/* toggles */}
          <div style={{display:"flex",flexDirection:"column",gap:16}}>
            {[
              {active:privateEvt,  set:setPrivateEvt,  label:"Private event",           desc:"Only people you invite can join. Shots are not visible outside the event."},
              {active:instantShare,set:setInstantShare,label:"Instant content sharing",  desc:"Shots are shared with attendees as soon as they're uploaded."},
            ].map(function(sw){return(
              <div key={sw.label} style={{display:"flex",flexDirection:"column",gap:4}}>
                <Toggle active={sw.active} onToggle={function(){sw.set(function(v){return !v;});}} label={sw.label}/>
                <div style={{display:"flex",gap:12}}><div style={{width:26.7,flexShrink:0}}/><span style={{fontFamily:sans,fontSize:14,lineHeight:"20px",color:C.textSecondary}}>{sw.desc}</span></div>
              </div>
            );})}
          </div>

          {/* action buttons */}
          <div style={{display:"flex",gap:16,alignItems:"center"}}>
            <button onClick={function(){handleSave(true);}} style={{border:"1px solid "+C.action,background:"none",borderRadius:999,padding:"8px 16px",fontFamily:sans,fontWeight:600,fontSize:16,color:C.action,cursor:"pointer",whiteSpace:"nowrap"}}>Save as draft</button>
            <button onClick={function(){handleSave(false);}} style={{background:C.action,border:"none",borderRadius:999,padding:"8px 16px",fontFamily:sans,fontWeight:600,fontSize:16,color:C.bgPage,cursor:"pointer",whiteSpace:"nowrap"}}>Create event</button>
          </div>

        </div>
      </div>
    </div>
  );
}


function App(){
  var [screen,setScreen]=useState("dashboard");
  var [activeEvent,setActiveEvent]=useState(null);
  var [defaultTab,setDefaultTab]=useState("Overview");
  function handleNav(key){
    if(key==="events"){setScreen("events");setActiveEvent(null);}
    else if(key==="dashboard"){setScreen("dashboard");setActiveEvent(null);}
    else if(key==="create"){setScreen("create");}
    else if(key==="accounts"){setScreen("accounts");}
  }
  function openEvent(ev,tab){setActiveEvent(ev);setScreen("hub");setDefaultTab(tab||"Overview");}
  function goToEvents(){setScreen("events");setActiveEvent(null);}
  if(screen==="hub")return <HubPage event={activeEvent} onGoToEvents={goToEvents} onNav={handleNav} defaultTab={defaultTab}/>;
  if(screen==="events")return <EventsListPage onOpenEvent={openEvent} onNav={handleNav}/>;
  if(screen==="create")return <CreateEventPage onNav={handleNav} onCreated={function(){setScreen("events");}}/>;
  if(screen==="accounts")return <AccountPage onNav={handleNav}/>;
  return <DashboardPage onNav={handleNav} onOpenEvent={openEvent}/>;
}

ReactDOM.createRoot(document.getElementById("root")).render(React.createElement(App));
</script>
</body>
