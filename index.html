// ── Primitives ────────────────────────────────────────────────────
function Tag({icon,label}){
  return <div style={{display:"flex",alignItems:"center",gap:4,padding:"2px 8px",borderRadius:4,flexShrink:0}}>{icon}<span style={{fontFamily:sans,fontWeight:400,fontSize:14,lineHeight:"20px",color:C.textPrimary,whiteSpace:"nowrap"}}>{label}</span></div>;
}
function Toggle({active,onToggle,label}){
  return(
    <div onClick={onToggle} style={{display:"flex",alignItems:"center",gap:12,cursor:"pointer",userSelect:"none"}}>
      <div style={{width:26.7,height:16,borderRadius:999,padding:"2.7px",boxSizing:"border-box",background:active?C.textPrimary:C.bgTertiary,display:"flex",alignItems:"center",justifyContent:active?"flex-end":"flex-start",transition:"background 0.2s",flexShrink:0}}>
        <div style={{width:10.7,height:10.7,borderRadius:"50%",background:active?C.bgPage:C.textPrimary}}/>
      </div>
      <span style={{fontFamily:sans,fontSize:16,lineHeight:"24px",color:C.textPrimary}}>{label}</span>
    </div>
  );
}
function Checkbox({checked,onClick}){
  var isChecked=checked===true,isIndet=checked==="indeterminate";
  return(
    <div onClick={onClick} style={{width:16,height:16,borderRadius:4,flexShrink:0,border:"1px solid "+(isChecked||isIndet?C.action:C.border),background:isChecked||isIndet?C.action:C.textPrimary,display:"flex",alignItems:"center",justifyContent:"center",cursor:"pointer",transition:"background 0.15s"}}>
      {isChecked&&<ICheck/>}
      {isIndet&&<div style={{width:8,height:2,background:C.bgPage,borderRadius:1}}/>}
    </div>
  );
}
function CheckboxField({checked,onClick,label}){
  return(
    <div onClick={onClick} style={{display:"flex",alignItems:"center",gap:12,minWidth:120,cursor:"pointer",userSelect:"none"}}>
      <Checkbox checked={checked}/>
      <span style={{fontFamily:sans,fontWeight:400,fontSize:14,lineHeight:"20px",color:C.textPrimary}}>{label}</span>
    </div>
  );
}
function CardChip({onClick,children}){
  return <div onClick={onClick} style={{background:C.bgPage,borderRadius:"50%",width:32,height:32,display:"flex",alignItems:"center",justifyContent:"center",cursor:"pointer",flexShrink:0}}>{children}</div>;
}
function ModalChip({onClick,tip,children}){
  var [hov,setHov]=useState(false);
  return <div onClick={onClick} title={tip} onMouseEnter={function(){setHov(true);}} onMouseLeave={function(){setHov(false);}} style={{width:36,height:36,borderRadius:"50%",background:C.action,display:"flex",alignItems:"center",justifyContent:"center",cursor:"pointer",flexShrink:0,opacity:hov?0.8:1,transition:"opacity 0.15s"}}>{children}</div>;
}
function IconBtn({onClick,children}){
  var [hov,setHov]=useState(false);
  return <div onClick={onClick} onMouseEnter={function(){setHov(true);}} onMouseLeave={function(){setHov(false);}} style={{padding:8,borderRadius:"50%",cursor:"pointer",display:"flex",alignItems:"center",justifyContent:"center",background:hov?C.bgTertiary:"transparent",transition:"background 0.15s"}}>{children}</div>;
}

        </div>
        <div style={{display:"flex",flexDirection:"column",gap:12}}>

// ── Preview Modal ─────────────────────────────────────────────────
function PreviewModal({shot,onClose,onDiscard}){
  var vidRef=useRef(null),trackRef=useRef(null);
  var [playing,setPlaying]=useState(false);
  var [current,setCurrent]=useState(0);
  var [duration,setDuration]=useState(0);
  var [seeking,setSeeking]=useState(false);
  var [visible,setVisible]=useState(false);
  var isLandscape=shot.orient==="landscape";
  var videoSrc=isLandscape?VIDEO_LANDSCAPE:VIDEO_PORTRAIT;
  useEffect(function(){var t=setTimeout(function(){setVisible(true);},10);return function(){clearTimeout(t);};},[]);
  useEffect(function(){var v=vidRef.current;if(!v)return;if(playing)v.play().catch(function(){setPlaying(false);});else v.pause();},[playing]);
  function onTrackDown(e){
    e.preventDefault();setSeeking(true);
    function seek(ex){var r=trackRef.current.getBoundingClientRect();var t=Math.max(0,Math.min(1,(ex-r.left)/r.width))*(vidRef.current.duration||0);vidRef.current.currentTime=t;setCurrent(t);}
    seek(e.clientX);
    function onMove(ev){seek(ev.clientX);}
    function onUp(){setSeeking(false);window.removeEventListener("mousemove",onMove);window.removeEventListener("mouseup",onUp);}
    window.addEventListener("mousemove",onMove);window.addEventListener("mouseup",onUp);
  }
  function handleClose(){setVisible(false);setTimeout(onClose,220);}
  var pct=duration>0?(current/duration)*100:0;
  return(
    <div onClick={handleClose} style={{position:"fixed",inset:0,zIndex:500,background:visible?"rgba(22,20,49,0.88)":"rgba(22,20,49,0)",backdropFilter:visible?"blur(8px)":"blur(0px)",display:"flex",alignItems:"center",justifyContent:"center",padding:24,transition:"background 0.22s,backdrop-filter 0.22s"}}>
      <div onClick={function(e){e.stopPropagation();}} style={{background:C.bgSecondary,borderRadius:24,display:"flex",flexDirection:"column",width:isLandscape?"min(720px,100%)":"min(420px,100%)",boxShadow:"0 24px 64px rgba(0,0,0,0.55)",overflow:"hidden",opacity:visible?1:0,transform:visible?"scale(1) translateY(0)":"scale(0.95) translateY(16px)",transition:"opacity 0.22s,transform 0.22s"}}>
        <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",padding:"16px 20px 0"}}>
          <span style={{fontFamily:sans,fontWeight:600,fontSize:18,color:C.textPrimary}}>Shot preview</span>
          <button onClick={handleClose} style={{background:"none",border:"none",cursor:"pointer",color:C.textSecondary,padding:4}}><IX size={20}/></button>
        </div>
        <div onClick={function(){setPlaying(function(v){return !v;});}} style={{position:"relative",background:"#000",margin:"12px 20px 0",borderRadius:12,overflow:"hidden",aspectRatio:isLandscape?"16/9":"9/16",cursor:"pointer",maxHeight:isLandscape?"none":"55vh"}}>
          <video ref={vidRef} src={videoSrc} style={{width:"100%",height:"100%",objectFit:"cover",display:"block"}} onLoadedMetadata={function(){setDuration(vidRef.current.duration);setPlaying(true);}} onTimeUpdate={function(){if(!seeking)setCurrent(vidRef.current.currentTime);}} onEnded={function(){setPlaying(false);}} preload="auto" playsInline muted/>
          {!playing&&<div style={{position:"absolute",inset:0,display:"flex",alignItems:"center",justifyContent:"center",pointerEvents:"none"}}><div style={{width:64,height:64,borderRadius:"50%",background:"rgba(22,20,49,0.72)",backdropFilter:"blur(4px)",display:"flex",alignItems:"center",justifyContent:"center"}}><IPlay size={26}/></div></div>}
        </div>
        <div style={{padding:"12px 20px 0",display:"flex",flexDirection:"column",gap:8}}>
          <div ref={trackRef} onMouseDown={onTrackDown} style={{position:"relative",height:6,borderRadius:3,background:"rgba(187,188,214,0.2)",cursor:"pointer"}}>
            <div style={{position:"absolute",top:0,left:0,height:"100%",width:pct+"%",borderRadius:3,background:C.action}}/>
            <div style={{position:"absolute",top:"50%",left:pct+"%",transform:"translate(-50%,-50%)",width:14,height:14,borderRadius:"50%",background:C.textPrimary,boxShadow:"0 0 0 3px rgba(241,102,92,0.35)"}}/>
          </div>
          <div style={{display:"flex",alignItems:"center",gap:12}}>
            <button onClick={function(){if(vidRef.current&&vidRef.current.ended){vidRef.current.currentTime=0;setCurrent(0);}setPlaying(function(v){return !v;});}} style={{background:"none",border:"none",cursor:"pointer",padding:0,display:"flex",alignItems:"center"}}>
              {playing?<IPause/>:<IPlay size={22}/>}
            </button>
            <span style={{fontFamily:mono,fontSize:13,color:C.textSecondary}}>{fmtSec(current)} / {fmtSec(duration)}</span>
          </div>
        </div>
        <div style={{padding:"16px 20px 20px",display:"flex",flexDirection:"column",gap:12}}>
          <div style={{height:1,background:C.bgTertiary}}/>
          <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",gap:16,flexWrap:"wrap"}}>
            <div style={{display:"flex",flexWrap:"wrap",gap:6}}>
              <Tag icon={<ICalendar/>} label={shot.date}/>
              <Tag icon={<IClock/>} label={shot.time}/>
              <Tag icon={<ITimer/>} label={shot.dur}/>
              <Tag icon={<IUser/>} label={shot.user}/>
              <Tag icon={<IFile/>} label={shot.size}/>
            </div>
            {onDiscard&&<div style={{display:"flex",alignItems:"center",gap:8,flexShrink:0}}>
              <ModalChip tip="Save" onClick={function(){}}><IHeart color={C.textSecondary} size={15}/></ModalChip>
              <ModalChip tip="Discard" onClick={function(){onDiscard(shot.id);handleClose();}}><ITrash color={C.textSecondary} size={15}/></ModalChip>
            </div>}
          </div>
        </div>
      </div>
    </div>
  );
}

// ── Range Slider ──────────────────────────────────────────────────
function RangeSlider({lo,hi,onChange,gridRef,containerW}){
  var trackRef=useRef(null),dragging=useRef(null);
  var [sliderW,setSliderW]=useState(null);
  useEffect(function(){
    if(containerW){setSliderW(null);return;}
    var el=gridRef&&gridRef.current;if(!el)return;
    function calc(){var gw=el.getBoundingClientRect().width;setSliderW(Math.round((gw-48)/4*2+16));}
    calc();var ro=new ResizeObserver(calc);ro.observe(el);return function(){ro.disconnect();};
  },[gridRef,containerW]);
  var fracFromX=useCallback(function(cx){var r=trackRef.current.getBoundingClientRect();return Math.max(0,Math.min(1,(cx-r.left)/r.width));},[]);
  useEffect(function(){
    function onMove(e){if(!dragging.current||!trackRef.current)return;var f=fracFromX(e.clientX);if(dragging.current==="lo")onChange(Math.min(f,hi-0.001),hi);else onChange(lo,Math.max(f,lo+0.001));}
    function onUp(){dragging.current=null;}
    window.addEventListener("mousemove",onMove);window.addEventListener("mouseup",onUp);
    return function(){window.removeEventListener("mousemove",onMove);window.removeEventListener("mouseup",onUp);};
  },[lo,hi,onChange,fracFromX]);
  function ts(pct){return{position:"absolute",top:"50%",left:(pct*100)+"%",transform:"translate(-50%,-50%)",width:20,height:20,borderRadius:"50%",background:C.textPrimary,cursor:"grab",zIndex:2,userSelect:"none",boxShadow:"0 0 0 3px rgba(255,255,255,0.2)"};}
  var w=containerW||(sliderW?sliderW+"px":"100%");
  return(
    <div style={{display:"flex",flexDirection:"column",gap:8,width:w}}>
      <div ref={trackRef} style={{position:"relative",height:6,borderRadius:3,background:"rgba(187,188,214,0.25)"}}>
        <div style={{position:"absolute",top:0,height:"100%",borderRadius:3,left:(lo*100)+"%",width:((hi-lo)*100)+"%",background:C.textSecondary}}/>
        <div style={ts(lo)} onMouseDown={function(e){e.preventDefault();dragging.current="lo";}}/>
        <div style={ts(hi)} onMouseDown={function(e){e.preventDefault();dragging.current="hi";}}/>
      </div>
      <div style={{display:"flex",justifyContent:"space-between"}}>
        <span style={{fontFamily:sans,fontSize:14,color:C.textPrimary}}>{fmtMs(TL_START+lo*TL_SPAN)}</span>
        <span style={{fontFamily:sans,fontSize:14,color:C.textPrimary}}>{fmtMs(TL_START+hi*TL_SPAN)}</span>
      </div>
    </div>
  );
}

  useEffect(function(){
    if(!hovering){setScrubPct(0);if(scrubRef.current)cancelAnimationFrame(scrubRef.current);return;}
    var start=null,dur=4000;
    function tick(ts){if(!start)start=ts;var el=(ts-start)%dur;setScrubPct((el/dur)*100);scrubRef.current=requestAnimationFrame(tick);}

          <div style={{width:20,height:20,borderRadius:4,background:selected?C.action:"rgba(22,20,49,0.6)",border:"2px solid "+(selected?C.action:C.textPrimary),display:"flex",alignItems:"center",justifyContent:"center",transition:"background 0.15s",backdropFilter:"blur(2px)"}}>

  var runningRef=useRef(false),barTimerRef=useRef(null),loopTimerRef=useRef(null);
  useEffect(function(){return function(){runningRef.current=false;clearInterval(barTimerRef.current);clearTimeout(loopTimerRef.current);};},[]);
  function startDownload(){
    setPhase("loading");setCards([]);setProgPct(0);setProgVisible(true);
    runningRef.current=true;
    var start=Date.now(),end=start+TOTAL_MS;
    barTimerRef.current=setInterval(function(){setProgPct(Math.min(((Date.now()-start)/TOTAL_MS)*92,92));if(Date.now()>=end)clearInterval(barTimerRef.current);},200);
    var idx=0;
    function pushStep(){
      if(!runningRef.current)return;
      if(Date.now()>=end){clearInterval(barTimerRef.current);setProgPct(100);setTimeout(function(){setProgVisible(false);setTimeout(function(){setPhase("done");},420);},600);return;}
      var step=DL_STEPS[idx%DL_STEPS.length];idx++;
      setCards(function(prev){return [Object.assign({},step,{_id:Date.now()})].concat(prev);});
      loopTimerRef.current=setTimeout(pushStep,STEP_DUR);
    }
    loopTimerRef.current=setTimeout(pushStep,100);
  }
  function renderStack(){
    return(
      <div style={{position:"relative",height:108,flexShrink:0,overflow:"visible"}}>
        {cards.slice(0,MAX_VIS).map(function(step,i){
          var opacity=i===0?1:i===1?0.5:i===2?0.25:0.1;
          return(
            <div key={step._id} style={{position:"absolute",left:0,right:0,height:72,background:C.bgTertiary,borderRadius:16,display:"flex",alignItems:"center",padding:"0 20px",gap:14,top:i*PEEK,zIndex:MAX_VIS-i,opacity:opacity,transform:"scale("+(1-i*0.03)+")",transition:"top .45s cubic-bezier(.4,0,.2,1),opacity .45s,transform .45s",animation:i===0?"slideIn .45s cubic-bezier(.4,0,.2,1) both":"none"}}>
              <div style={{width:40,height:40,background:C.bgSecondary,borderRadius:10,display:"flex",alignItems:"center",justifyContent:"center",flexShrink:0,color:C.action}}>{step.icon}</div>
              <span style={{flex:1,fontFamily:sans,fontSize:14,fontWeight:600,color:C.textPrimary}}>{step.label}</span>
            </div>
          );
        })}
      </div>
    );
  }
  return(
    <div onClick={phase==="pre"?onCancel:undefined} style={{position:"fixed",inset:0,zIndex:600,background:"rgba(22,20,49,0.75)",backdropFilter:"blur(4px)",display:"flex",alignItems:"center",justifyContent:"center"}}>
      <div onClick={function(e){e.stopPropagation();}} style={{background:C.bgSecondary,borderRadius:24,padding:32,display:"flex",flexDirection:"column",gap:32,width:440}}>
        {phase==="pre"&&(<>
          <div style={{display:"flex",flexDirection:"column",gap:16,alignItems:"center",textAlign:"center"}}>
            <div style={{background:C.action,borderRadius:"50%",width:64,height:64,display:"flex",alignItems:"center",justifyContent:"center"}}><IDownload color={C.bgPage} size={28}/></div>
            <div style={{display:"flex",flexDirection:"column",gap:4}}>
              <p style={{fontFamily:sans,fontWeight:600,fontSize:32,lineHeight:"40px",color:C.textPrimary,margin:0}}>Download shots</p>
              <p style={{fontFamily:sans,fontSize:16,color:C.textSecondary,margin:0}}>You will download the following data:</p>
            </div>
            <div style={{display:"flex",gap:16,width:"100%"}}>
              {[{v:String(count),l:count!==1?"Total files":"Total file"},{v:mb+" MB",l:"Total size"}].map(function(s){return(
                <div key={s.l} style={{flex:1,background:C.bgTertiary,borderRadius:16,padding:"24px 32px",display:"flex",flexDirection:"column",alignItems:"center",gap:4}}>
                  <span style={{fontFamily:sans,fontWeight:800,fontSize:36,lineHeight:"44px",color:C.textPrimary}}>{s.v}</span>
                  <span style={{fontFamily:sans,fontSize:16,color:C.textSecondary,whiteSpace:"nowrap"}}>{s.l}</span>
                </div>
              );})}
            </div>
          </div>
          <div style={{display:"flex",gap:16}}>
            <button onClick={onCancel} style={{flex:1,border:"1px solid "+C.action,background:"none",borderRadius:999,padding:"16px 24px",fontFamily:sans,fontWeight:600,fontSize:20,color:C.action,cursor:"pointer"}}>Cancel</button>
            <button onClick={startDownload} style={{flex:1,background:C.action,border:"none",borderRadius:999,padding:"16px 24px",fontFamily:sans,fontWeight:600,fontSize:20,color:C.bgPage,cursor:"pointer",display:"flex",alignItems:"center",justifyContent:"center",gap:12}}><IDownload color={C.bgPage} size={22}/> Download</button>
          </div>
        </>)}
        {phase==="loading"&&(<>
          <div style={{display:"flex",flexDirection:"column",alignItems:"center",gap:16}}>
            <div style={{background:C.action,borderRadius:"50%",width:64,height:64,display:"flex",alignItems:"center",justifyContent:"center"}}><IDownload color={C.bgPage} size={28}/></div>
            <p style={{fontFamily:sans,fontWeight:600,fontSize:32,color:C.textPrimary,margin:0,textAlign:"center"}}>Compiling…</p>
          </div>
          <div style={{display:"flex",flexDirection:"column",gap:32,opacity:progVisible?1:0,transform:progVisible?"scale(1)":"scale(0.97)",transition:"opacity .4s,transform .4s"}}>
            {renderStack()}
            <div style={{width:"100%",height:6,background:C.bgTertiary,borderRadius:999,overflow:"hidden"}}>
              <div style={{height:"100%",width:progPct.toFixed(1)+"%",background:C.action,borderRadius:999,transition:"width 1s cubic-bezier(.4,0,.2,1)"}}/>

        {phase==="done"&&(

            <div style={{display:"flex",flexDirection:"column",alignItems:"center",gap:16}}>

            </div>
            <button onClick={onConfirm} style={{width:"100%",background:C.action,border:"none",borderRadius:999,padding:"16px 24px",fontFamily:sans,fontWeight:600,fontSize:20,color:C.bgPage,cursor:"pointer",display:"flex",alignItems:"center",justifyContent:"center",gap:12}}><IDownload color={C.bgPage} size={20}/> Download</button>
            <button onClick={function(){setCopyToast(true);setTimeout(function(){setCopyToast(false);},2200);}} style={{width:"100%",background:"transparent",border:"1px solid rgba(187,188,214,.4)",borderRadius:999,padding:"16px 24px",fontFamily:sans,fontWeight:600,fontSize:20,color:C.textSecondary,cursor:"pointer",display:"flex",alignItems:"center",justifyContent:"center",gap:12}}>

    </div>
  );
}

// ── Batch Dropdown ────────────────────────────────────────────────
function BatchDropdown({count,onDownload,onCollection,onDiscard}){
  var [open,setOpen]=useState(false),ref=useRef(null);
  useEffect(function(){function h(e){if(ref.current&&!ref.current.contains(e.target))setOpen(false);}document.addEventListener("mousedown",h);return function(){document.removeEventListener("mousedown",h);};},[]);
  var items=[
    {label:"Download videos",  color:C.textPrimary,action:function(){setOpen(false);onDownload();},  icon:<IDownload color={C.textPrimary} size={16}/>},
    {label:"Create highlight", color:C.textPrimary,action:function(){setOpen(false);onCollection();},icon:<IStar color={C.textPrimary} size={16}/>},
    {label:"Discard selected", color:C.action,     action:function(){setOpen(false);onDiscard();},   icon:<ITrash color={C.action} size={16}/>},
  ];
  return(
    <div ref={ref} style={{position:"relative"}}>
      <button onClick={function(){setOpen(function(v){return !v;});}} style={{background:C.action,border:"none",borderRadius:999,padding:"8px 12px 8px 16px",display:"flex",alignItems:"center",gap:8,cursor:"pointer"}}>
        <ILayers color={C.bgPage} size={20}/>
        <span style={{fontFamily:sans,fontWeight:600,fontSize:16,color:C.bgPage}}>{"Batch ("+count+")"}</span>
        <IChevDown color={C.bgPage} size={18}/>
      </button>
      {open&&(
        <div style={{position:"absolute",top:"calc(100% + 6px)",right:0,zIndex:50,background:C.bgSecondary,borderRadius:12,padding:6,boxShadow:"0 8px 24px rgba(0,0,0,0.35)",minWidth:200}}>
          {items.map(function(item){return(
            <div key={item.label} onClick={item.action}
              onMouseEnter={function(e){e.currentTarget.style.background=C.bgTertiary;}}
              onMouseLeave={function(e){e.currentTarget.style.background="transparent";}}
              style={{padding:"10px 16px",display:"flex",alignItems:"center",gap:10,borderRadius:8,cursor:"pointer",fontFamily:sans,fontSize:15,color:item.color,whiteSpace:"nowrap",background:"transparent"}}>

      )}
    </div>
  );
}

// ── New / Edit Highlight Page ─────────────────────────────────────
function NewHighlightPage({onCancel,onPublish,favIds,onToggleFav,editHighlight}){
  var isEdit=!!editHighlight;
  var [name,setName]=useState(isEdit?editHighlight.name:"");
  var [nameFocused,setNameFocused]=useState(false);
  var [featured,setFeatured]=useState(isEdit?editHighlight.status==="featured":false);
  var [selectedIds,setSelectedIds]=useState(isEdit?new Set(editHighlight.selectedIds||[]):new Set());
  var [showMeta,setShowMeta]=useState(true);
  var [showFavsOnly,setShowFavsOnly]=useState(false);
  var [rangeLo,setRangeLo]=useState(0);
  var [rangeHi,setRangeHi]=useState(1);
  var [previewShot,setPreviewShot]=useState(null);
  var [confirmDiscard,setConfirmDiscard]=useState(false);
  var [showArrange,setShowArrange]=useState(false);
  var [done,setDone]=useState(false);

  useEffect(function(){
    if(!done)return;
    var t=setTimeout(function(){onPublish();},3000);
    return function(){clearTimeout(t);};
  },[done]);

  var loMs=TL_START+rangeLo*TL_SPAN,hiMs=TL_START+rangeHi*TL_SPAN;
  var visible=SHOTS.filter(function(s){return s.ts>=loMs&&s.ts<=hiMs;}).filter(function(s){return !showFavsOnly||favIds.has(s.id);});
  var allSel=visible.length>0&&visible.every(function(s){return selectedIds.has(s.id);});
  var someSel=!allSel&&visible.some(function(s){return selectedIds.has(s.id);});
  var checkState=allSel?true:someSel?"indeterminate":false;

  function toggleShot(id){setSelectedIds(function(p){var n=new Set(p);n.has(id)?n.delete(id):n.add(id);return n;});}
  function handleSelectAll(){if(allSel){setSelectedIds(function(p){var n=new Set(p);visible.forEach(function(s){n.delete(s.id);});return n;});}else{setSelectedIds(function(p){var n=new Set(p);visible.forEach(function(s){n.add(s.id);});return n;});}}
  var handleRange=useCallback(function(lo,hi){setRangeLo(lo);setRangeHi(hi);},[]);
  var canPublish=name.trim()&&selectedIds.size>0;
  function handleBack(){if(name.trim()||selectedIds.size>0){setConfirmDiscard(true);}else{onCancel();}}

  if(done){
    return(
      <div style={{display:"flex",alignItems:"flex-start",minHeight:"100vh",background:C.bgPage}}>

        <div style={{flex:1,display:"flex",alignItems:"center",justifyContent:"center",minHeight:"100vh"}}>
          <div style={{background:C.bgSecondary,borderRadius:24,padding:40,display:"flex",flexDirection:"column",alignItems:"center",gap:24,width:420,textAlign:"center",animation:"fadeUp .4s ease both"}}>
            <div style={{background:C.action,borderRadius:"50%",width:72,height:72,display:"flex",alignItems:"center",justifyContent:"center"}}><svg width="36" height="36" viewBox="0 0 24 24" fill="none" stroke={C.bgPage} strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round"><polyline points="20 6 9 17 4 12"/></svg></div>

              <p style={{fontFamily:sans,fontWeight:600,fontSize:28,color:C.textPrimary,margin:0}}>{isEdit?"Changes saved!":"Highlight created!"}</p>
              <p style={{fontFamily:sans,fontSize:16,lineHeight:"24px",color:C.textSecondary,margin:0}}>{isEdit?'"'+name+'" has been updated.':'"'+name+'" has been published'+(featured?" and featured on the event page":"")+"."}
              </p>
              <p style={{fontFamily:sans,fontSize:14,color:C.textMuted,margin:0}}>Taking you to the panel…</p>
            </div>
          </div>
        </div>
      </div>
    );
  }

  return(
    <div style={{display:"flex",alignItems:"flex-start",minHeight:"100vh",background:C.bgPage}}>
      <Sidebar/>
      <div style={{flex:1,display:"flex",flexDirection:"column",gap:10,padding:"24px 16px",overflowY:"auto",boxSizing:"border-box"}}>

        {confirmDiscard&&(
          <div style={{position:"fixed",inset:0,zIndex:500,background:"rgba(22,20,49,0.8)",backdropFilter:"blur(4px)",display:"flex",alignItems:"center",justifyContent:"center"}}>
            <div style={{background:C.bgSecondary,borderRadius:24,padding:32,display:"flex",flexDirection:"column",gap:32,width:400,textAlign:"center"}}>
              <div style={{display:"flex",flexDirection:"column",gap:16,alignItems:"center"}}>
                <div style={{background:C.action,borderRadius:"50%",width:64,height:64,display:"flex",alignItems:"center",justifyContent:"center"}}><svg width="34" height="34" viewBox="0 0 24 24" fill="none" stroke={C.bgPage} strokeWidth="2"><path d="M10.29 3.86L1.82 18a2 2 0 0 0 1.71 3h16.94a2 2 0 0 0 1.71-3L13.71 3.86a2 2 0 0 0-3.42 0z"/><line x1="12" y1="9" x2="12" y2="13"/><line x1="12" y1="17" x2="12.01" y2="17"/></svg></div>
                <div style={{display:"flex",flexDirection:"column",gap:4}}>
                  <p style={{fontFamily:sans,fontWeight:600,fontSize:32,lineHeight:"40px",color:C.textPrimary,margin:0}}>Discard progress?</p>
                  <p style={{fontFamily:sans,fontSize:16,lineHeight:"24px",color:C.textSecondary,margin:0}}>You will lose your changes.</p>

              </div>
            </div>
          </div>

        {/* Header */}
        <div style={{background:C.bgSecondary,borderRadius:12,padding:"16px 24px",display:"flex",alignItems:"center",gap:16}}>
          <button onClick={handleBack} style={{background:C.bgTertiary,border:"none",borderRadius:"50%",width:40,height:40,display:"flex",alignItems:"center",justifyContent:"center",cursor:"pointer",flexShrink:0}}>

              Save as draft
            </button>
            <button onClick={function(){if(canPublish)setShowArrange(true);}}
              style={{background:canPublish?C.action:C.bgTertiary,border:"none",borderRadius:999,padding:"12px 24px",fontFamily:sans,fontWeight:600,fontSize:16,color:canPublish?C.bgPage:C.textMuted,cursor:canPublish?"pointer":"not-allowed",transition:"background .2s,color .2s"}}>
              Publish
            </button>
          </div>
        </div>

        {/* Name + Featured */}
        <div style={{background:C.bgSecondary,borderRadius:12,padding:"20px 24px",display:"flex",flexDirection:"column",gap:16}}>
          <div style={{display:"flex",flexDirection:"column",gap:6,maxWidth:480}}>
            <span style={{fontFamily:mono,fontWeight:700,fontSize:12,color:C.textPrimary}}>Highlight name</span>
            <input value={name}
              onChange={function(e){setName(e.target.value);}}
              onFocus={function(){setNameFocused(true);}}
              onBlur={function(){setNameFocused(false);}}
              placeholder="e.g. Best moments of the night"
              style={{border:"2px solid "+(nameFocused?C.textPrimary:C.border),borderRadius:12,padding:"10px 20px",fontFamily:sans,fontSize:16,background:C.bgTertiary,outline:"none",width:"100%"}}/>
          </div>
          <div style={{display:"flex",flexDirection:"column",gap:6}}>
            <Toggle active={featured} onToggle={function(){setFeatured(function(v){return !v;});}} label="Featured highlight"/>
            <span style={{fontFamily:sans,fontSize:13,lineHeight:"18px",color:C.textSecondary,paddingLeft:38}}>Featured highlights appear on the attendees' home screen in the app.</span>
          </div>
        </div>

        {/* Shot selection */}
        <div style={{background:C.bgSecondary,borderRadius:12,padding:"16px 24px",display:"flex",flexDirection:"column",gap:16}}>
          <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",gap:24,flexWrap:"wrap"}}>
            <div style={{display:"flex",flexDirection:"column",gap:6}}>
              <span style={{fontFamily:mono,fontWeight:700,fontSize:12,lineHeight:"16px",color:C.textPrimary}}>Filter by date</span>
              <RangeSlider lo={rangeLo} hi={rangeHi} onChange={handleRange} containerW="380px"/>
            </div>
            <div style={{display:"flex",alignItems:"center",gap:24,flexWrap:"wrap"}}>
              <Toggle active={showMeta} onToggle={function(){setShowMeta(function(v){return !v;});}} label="Show metadata"/>
              <Toggle active={showFavsOnly} onToggle={function(){setShowFavsOnly(function(v){return !v;});}} label="Favorites only"/>
              <CheckboxField checked={checkState} onClick={handleSelectAll} label={"Select all ("+visible.length+")"}/>
            </div>
          </div>
          {visible.length>0
            ? <div style={{display:"grid",gridTemplateColumns:"repeat(4,1fr)",gap:16}}>
                {visible.map(function(shot){return(
                  <ShotCard key={shot.id} shot={shot}
                    selected={selectedIds.has(shot.id)}
                    onToggle={function(){toggleShot(shot.id);}}
                    onPreview={function(){setPreviewShot(shot);}}
                    fav={favIds.has(shot.id)}
                    onToggleFav={function(){onToggleFav(shot.id);}}
                    showMeta={showMeta}
                    discarded={false}
                    highlightMode={true}
                  />
                );})}
              </div>
            : <div style={{textAlign:"center",padding:"48px 0",color:C.textSecondary,fontFamily:sans,fontSize:16}}>No shots in this time range.</div>
          }
        </div>
      </div>

      {previewShot&&<PreviewModal shot={previewShot} onClose={function(){setPreviewShot(null);}}/>}
      {showArrange&&(
        <ArrangeModal
          selectedIds={selectedIds}
          onBack={function(){setShowArrange(false);}}
          onPublish={function(){setShowArrange(false);setDone(true);}}
        />
      )}
    </div>
  );
}

// ── Shots Panel ───────────────────────────────────────────────────
function ShotsPanel({selectedIds,onToggle,onSelectAll,onDeselectAll,favIds,onToggleFav,showMeta,onToggleMeta,showFavsOnly,onToggleFavsOnly,rangeLo,rangeHi,onRange,onDownload,onCollection,onPreview,discardedIds,onDiscard,onRecover,onBatchDiscard,activeTab,onTabChange,onNewHighlight,highlights,onEditHighlight,onDeleteHighlight}){
  var [innerTab,setInnerTab]=useState("shots");
  var count=selectedIds.size;
  var loMs=TL_START+rangeLo*TL_SPAN,hiMs=TL_START+rangeHi*TL_SPAN;
  var gridRef=useRef(null);
  var tabs=["Shots","Attendees","Highlights","Pages","Settings"];
  var activeShots=SHOTS.filter(function(s){return !discardedIds.has(s.id);}).filter(function(s){return s.ts>=loMs&&s.ts<=hiMs;}).filter(function(s){return !showFavsOnly||favIds.has(s.id);});
  var discardedShots=SHOTS.filter(function(s){return discardedIds.has(s.id);});
  var visible=innerTab==="shots"?activeShots:discardedShots;
  var allSel=visible.length>0&&visible.every(function(s){return selectedIds.has(s.id);});
  var someSel=!allSel&&visible.some(function(s){return selectedIds.has(s.id);});
  var checkState=allSel?true:someSel?"indeterminate":false;
  function handleCheckbox(){if(allSel)onDeselectAll(visible);else onSelectAll(visible);}
  return(
    <div style={{background:C.bgSecondary,borderRadius:12,padding:"8px 24px 16px",display:"flex",flexDirection:"column",gap:12}}>
      <div style={{display:"flex",alignItems:"center",gap:12,padding:"8px 12px"}}>
        {tabs.map(function(t){
          var active=t===activeTab;
          return(
            <div key={t} onClick={function(){onTabChange(t);}} style={{minWidth:128,padding:8,textAlign:"center",cursor:"pointer",borderBottom:active?"2px solid "+C.textPrimary:"2px solid transparent"}}>
              <span style={{fontFamily:sans,fontWeight:600,fontSize:16,lineHeight:"24px",color:active?C.textPrimary:C.textSecondary}}>{t}</span>
            </div>
          );
        })}
      </div>
      {activeTab==="Highlights"
        ? <HighlightsPanel onNewHighlight={onNewHighlight} highlights={highlights} onEdit={onEditHighlight} onDelete={onDeleteHighlight}/>
        : <>
            <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",gap:24,padding:"12px 0"}}>
              <div style={{display:"flex",flexDirection:"column",gap:6}}>
                <span style={{fontFamily:mono,fontWeight:700,fontSize:12,lineHeight:"16px",color:C.textPrimary}}>Filter by date</span>
                <RangeSlider lo={rangeLo} hi={rangeHi} onChange={onRange} gridRef={gridRef}/>
              </div>
              <div style={{display:"flex",alignItems:"center",gap:8,flexShrink:0}}>
                <div style={{border:"1px solid "+C.action,borderRadius:999,padding:"8px 16px",display:"flex",alignItems:"center",gap:12,cursor:"pointer"}}>
                  <IUpload size={20}/>
                  <span style={{fontFamily:sans,fontWeight:600,fontSize:16,color:C.action}}>Upload</span>
                </div>
                <BatchDropdown count={count} onDownload={onDownload} onCollection={onCollection} onDiscard={onBatchDiscard}/>
              </div>
            </div>
            <div style={{display:"flex",alignItems:"center",gap:24,flexWrap:"wrap"}}>
              <Toggle active={showMeta} onToggle={onToggleMeta} label="Show shot metadata"/>
              <Toggle active={showFavsOnly} onToggle={onToggleFavsOnly} label="Favorites only"/>
              <CheckboxField checked={checkState} onClick={handleCheckbox} label={"Select all ("+visible.length+")"}/>
              <div onClick={function(){setInnerTab(function(t){return t==="shots"?"discarded":"shots";});}}
                style={{display:"flex",alignItems:"center",gap:8,cursor:"pointer",padding:"4px 12px",borderRadius:8,background:innerTab==="discarded"?C.bgTertiary:"transparent",transition:"background 0.15s",userSelect:"none",marginLeft:"auto"}}>
                <ITrash color={innerTab==="discarded"?C.textPrimary:C.textMuted} size={14}/>
                <span style={{fontFamily:sans,fontSize:14,lineHeight:"20px",color:innerTab==="discarded"?C.textPrimary:C.textMuted,whiteSpace:"nowrap"}}>Discarded shots</span>
                {discardedShots.length>0&&(
                  <div style={{background:C.action,borderRadius:999,minWidth:18,height:18,display:"flex",alignItems:"center",justifyContent:"center",padding:"0 5px"}}>
                    <span style={{fontFamily:mono,fontWeight:700,fontSize:10,color:C.bgPage}}>{discardedShots.length}</span>
                  </div>
                )}
              </div>
            </div>
            {innerTab==="discarded"&&(
              <div style={{display:"flex",flexDirection:"column",gap:4,padding:"12px 16px",background:C.bgTertiary,borderRadius:12}}>
                <span style={{fontFamily:sans,fontWeight:600,fontSize:15,color:C.textPrimary}}>Discarded shots</span>
                <span style={{fontFamily:sans,fontSize:13,lineHeight:"18px",color:C.textSecondary}}>These shots have been removed from the event view. They'll be kept here for 30 days, then permanently deleted.</span>
              </div>
            )}
            {visible.length>0
              ? <div ref={gridRef} style={{display:"grid",gridTemplateColumns:"repeat(4,1fr)",gap:16}}>
                  {visible.map(function(shot){return(
                    <ShotCard key={shot.id} shot={shot}
                      selected={selectedIds.has(shot.id)} onToggle={function(){onToggle(shot.id);}}
                      onPreview={function(){onPreview(shot);}}
                      fav={favIds.has(shot.id)} onToggleFav={function(){onToggleFav(shot.id);}}
                      showMeta={showMeta} discarded={discardedIds.has(shot.id)}
                      onDiscard={function(){onDiscard(shot.id);}} onRecover={function(){onRecover(shot.id);}}
                    />
                  );})}
                </div>
              : <div ref={gridRef} style={{textAlign:"center",padding:"48px 0",color:C.textSecondary,fontFamily:sans,fontSize:16}}>
                  {innerTab==="discarded"?"No discarded shots.":"No shots in this time range."}
                </div>
            }
          </>
      }
    </div>
  );
}

// ── App ───────────────────────────────────────────────────────────
function App(){
  var [page,setPage]=useState("main");
  var [editTarget,setEditTarget]=useState(null);
  var [selectedIds,setSelectedIds]=useState(new Set());
  var [favIds,setFavIds]=useState(new Set());
  var [discardedIds,setDiscardedIds]=useState(new Set());
  var [showMeta,setShowMeta]=useState(true);
  var [showFavsOnly,setShowFavsOnly]=useState(false);
  var [rangeLo,setRangeLo]=useState(0);
  var [rangeHi,setRangeHi]=useState(1);
  var [showDlModal,setShowDlModal]=useState(false);
  var [showArrangeModal,setShowArrangeModal]=useState(false);
  var [arrangeIds,setArrangeIds]=useState(new Set());
  var [previewShot,setPreviewShot]=useState(null);
  var [activeTab,setActiveTab]=useState("Shots");
  var [highlights,setHighlights]=useState(HIGHLIGHTS_SEED);

  function toggleCard(id){setSelectedIds(function(p){var n=new Set(p);n.has(id)?n.delete(id):n.add(id);return n;});}
  function toggleFav(id){setFavIds(function(p){var n=new Set(p);n.has(id)?n.delete(id):n.add(id);return n;});}
  function discardShot(id){setDiscardedIds(function(p){var n=new Set(p);n.add(id);return n;});setSelectedIds(function(p){var n=new Set(p);n.delete(id);return n;});}
  function recoverShot(id){setDiscardedIds(function(p){var n=new Set(p);n.delete(id);return n;});}
  function batchDiscard(){setDiscardedIds(function(p){var n=new Set(p);selectedIds.forEach(function(id){n.add(id);});return n;});setSelectedIds(new Set());}
  function deleteHighlight(id){setHighlights(function(p){return p.filter(function(h){return h.id!==id;});});}
  var selectAll=useCallback(function(shots){setSelectedIds(function(p){var n=new Set(p);shots.forEach(function(s){n.add(s.id);});return n;});},[]);
  var deselectAll=useCallback(function(shots){setSelectedIds(function(p){var n=new Set(p);shots.forEach(function(s){n.delete(s.id);});return n;});},[]);
  var handleRange=useCallback(function(lo,hi){setRangeLo(lo);setRangeHi(hi);},[]);

  if(page==="new-highlight"||page==="edit-highlight"){
    return <NewHighlightPage
      onCancel={function(){setPage("main");setEditTarget(null);}}
      onPublish={function(){setActiveTab("Highlights");setPage("main");setEditTarget(null);}}
      favIds={favIds}
      onToggleFav={toggleFav}
      editHighlight={editTarget}
    />;
  }

  return(
    <div style={{display:"flex",alignItems:"flex-start",minHeight:"100vh",background:C.bgPage,fontFamily:sans}}>
      <Sidebar/>
      <div style={{flex:1,display:"flex",flexDirection:"column",gap:10,padding:"24px 16px",overflowY:"auto",boxSizing:"border-box"}}>
        <EventSummary/>
        <ShotsPanel
          selectedIds={selectedIds} onToggle={toggleCard}
          onSelectAll={selectAll} onDeselectAll={deselectAll}
          favIds={favIds} onToggleFav={toggleFav}
          discardedIds={discardedIds} onDiscard={discardShot} onRecover={recoverShot} onBatchDiscard={batchDiscard}
          showMeta={showMeta} onToggleMeta={function(){setShowMeta(function(v){return !v;});}}
          showFavsOnly={showFavsOnly} onToggleFavsOnly={function(){setShowFavsOnly(function(v){return !v;});}}
          rangeLo={rangeLo} rangeHi={rangeHi} onRange={handleRange}
          onDownload={function(){setShowDlModal(true);}}
          onCollection={function(){setArrangeIds(new Set(selectedIds));setShowArrangeModal(true);}}
          onPreview={function(shot){setPreviewShot(shot);}}
          activeTab={activeTab} onTabChange={setActiveTab}
          onNewHighlight={function(){setPage("new-highlight");}}
          onEditHighlight={function(h){setEditTarget(h);setPage("edit-highlight");}}
          onDeleteHighlight={deleteHighlight}
          highlights={highlights}
        />
      </div>
      {previewShot&&<PreviewModal shot={previewShot} onClose={function(){setPreviewShot(null);}} onDiscard={discardShot}/>}
      {showDlModal&&<DownloadModal selectedIds={selectedIds} onConfirm={function(){setShowDlModal(false);}} onCancel={function(){setShowDlModal(false);}}/>}
      {showArrangeModal&&<ArrangeModal
        selectedIds={arrangeIds}
        onBack={function(){setShowArrangeModal(false);}}
        onPublish={function(){setShowArrangeModal(false);setActiveTab("Highlights");}}
      />}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(React.createElement(App));
</script>
</body>
</html>
